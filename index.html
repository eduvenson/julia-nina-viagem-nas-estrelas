<body>
<canvas id="c"></canvas>
<button class="mute" id="muteBtn">🔊</button>

<div id="welcome" class="scr on">
  <div class="ws">🚀</div>
  <div class="wt">Viagem nas Estrelas</div>
  <div class="wu">Um jogo feito só pra Ninna e Julia!<br>¡Un juego hecho solo para Ninna y Julia!</div>
  <button class="btn-main" id="startBtn">Começar ✨</button>
</div>

<div id="intro" class="scr"></div>

<div id="pick" class="scr">
  <div class="pk-t">Quem é você? 🧑‍🚀</div>
  <div class="pk-r">
    <div class="pk-c" id="cN"><div id="aN"></div><div class="pk-n">Ninna</div><div class="pk-f">🇦🇷</div></div>
    <div class="pk-c" id="cJ"><div id="aJ"></div><div class="pk-n">Julia</div><div class="pk-f">🇧🇷</div></div>
  </div>
  <button class="pk-g" id="pkG">🚀</button>
</div>

<div id="travel" class="scr">
  <div class="warp" id="warp"></div>
  <div class="crew" id="crew"></div>
  <div class="stg" id="stg"></div>

</div>

  <canvas id="p2c"></canvas>
  <div class="p2-hud">
    <div class="p2-lives" id="p2lives"></div>
    <div class="p2-xp" id="p2xp">⭐ 0</div>

  </div>
  <div class="p2-bar">
    <div class="p2-bar-fill" id="p2bf"></div>
    <div class="p2-bar-s">☀️</div>

  </div>

  <div class="p2-fuel"><div class="p2-fuel-fill" id="p2fuel"></div></div>
</div>

<script>
// ============== AUDIO via silent HTML Audio element + Web Audio ==============
// iOS Safari requires: 1) Audio element played on user gesture, 2) AudioContext created on user gesture
var AC = null;
var silentAudio = null;
var muted = false;
var bgOn = false;
var bgGain = null;
var audioUnlocked = false;

// Create a tiny silent WAV as data URI for iOS unlock
var silentWav = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=';

function unlockAudio() {
  if (audioUnlocked) return;
  try {
    // Method 1: HTML Audio element (iOS needs this)
    silentAudio = new Audio(silentWav);
    silentAudio.setAttribute('playsinline', '');
    silentAudio.volume = 0.01;
    var p = silentAudio.play();
    if (p && p.then) p.then(function(){}).catch(function(){});

    // Method 2: Web Audio API
    AC = new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();

    // Method 3: Create and immediately play a silent buffer
    var buf = AC.createBuffer(1, 1, AC.sampleRate);
    var src = AC.createBufferSource();
    src.buffer = buf;
    src.connect(AC.destination);
    src.start(0);

    audioUnlocked = true;
    console.log('Audio unlocked, state:', AC.state);
  } catch(e) {
    console.log('Audio unlock error:', e);
  }
}

function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
  if (bgGain) bgGain.gain.value = muted ? 0 : 0.055;
}

document.getElementById('muteBtn').addEventListener('click', function() {
  unlockAudio();
  toggleMute();
});

function startBGM() {
  if (bgOn || !AC) return;
  bgOn = true;
  if (AC.state === 'suspended') AC.resume();
  bgGain = AC.createGain();
  bgGain.gain.value = muted ? 0 : 0.055;
  bgGain.connect(AC.destination);
  var notes = [261.6,329.6,392,523.2,392,329.6,261.6,196,261.6,329.6,392,440,392,329.6,293.6,261.6];
  var ni = 0;
  function tick() {
    try {
      if (!muted && AC && AC.state === 'running') {
        var now = AC.currentTime;
        var o = AC.createOscillator();
        var g = AC.createGain();
        var f = AC.createBiquadFilter();
        f.type = 'lowpass'; f.frequency.value = 900;
        o.connect(f); f.connect(g); g.connect(bgGain);
        o.type = 'sine'; o.frequency.value = notes[ni % notes.length];
        g.gain.setValueAtTime(0.45, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
        o.start(now); o.stop(now + 2);
        var h = AC.createOscillator();
        var hg = AC.createGain();
        h.connect(hg); hg.connect(bgGain);
        h.type = 'triangle'; h.frequency.value = notes[ni % notes.length] * 1.498;
        hg.gain.setValueAtTime(0.1, now);
        hg.gain.exponentialRampToValueAtTime(0.001, now + 1.4);
        h.start(now + 0.05); h.stop(now + 1.5);
      }
      ni++;
    } catch(e) {}
    setTimeout(tick, 1900);
  }
  tick();
  try {
    var pad = AC.createOscillator();
    var pg = AC.createGain();
    var pf = AC.createBiquadFilter();
    pf.type = 'lowpass'; pf.frequency.value = 350;
    pad.connect(pf); pf.connect(pg); pg.connect(bgGain);
    pad.type = 'sine'; pad.frequency.value = 130.8; pg.gain.value = 0.25;
    pad.start();
  } catch(e) {}
}

function playTone(freq, type, vol, dur) {
  if (!AC || muted) return;
  try {
    if (AC.state === 'suspended') AC.resume();
    var o = AC.createOscillator();
    var g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.frequency.value = freq; o.type = type || 'sine';
    g.gain.setValueAtTime(vol || 0.1, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.start(AC.currentTime); o.stop(AC.currentTime + dur + 0.05);
  } catch(e) {}
}

function snd(tp) {
  if (muted || !AC) return;
  try {
    if (AC.state === 'suspended') AC.resume();
    if (!bgOn) startBGM();
    if (tp === 'click') playTone(660, 'sine', 0.12, 0.08);
    if (tp === 'warp') { playTone(150, 'sawtooth', 0.07, 0.6); setTimeout(function(){ playTone(450, 'sine', 0.06, 0.3) }, 200); }
    if (tp === 'land') { [440,554,660].forEach(function(f,i){ setTimeout(function(){ playTone(f, 'sine', 0.1, 0.18) }, i*90) }) }
    if (tp === 'ok') { [523,659,784].forEach(function(f,i){ setTimeout(function(){ playTone(f, 'sine', 0.11, 0.2) }, i*100) }) }
    if (tp === 'no') playTone(250, 'square', 0.06, 0.2);
    if (tp === 'win') { [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){ playTone(f, 'sine', 0.12, 0.3) }, i*150) }) }
    if (tp === 'intro') { playTone(392, 'sine', 0.09, 0.35); setTimeout(function(){ playTone(523, 'sine', 0.08, 0.3) }, 180); }
  } catch(e) {}

function initC() { W = cv.width = innerWidth; H = cv.height = innerHeight; ss = []; for (var i = 0; i < 200; i++) ss.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.5+.3, v:Math.random()*1+.2, o:Math.random()}) }
function draw() {
  ctx.fillStyle = 'rgba(5,8,22,.22)'; ctx.fillRect(0,0,W,H);
  for (var i = 0; i < ss.length; i++) {

    else { s.x -= s.v*0.25; s.o += Math.sin(Date.now()*s.v*0.003)*0.01; if(s.o<0.1)s.o=0.1; if(s.o>1)s.o=1; ctx.fillStyle = 'rgba(255,255,255,'+s.o+')'; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.28); ctx.fill(); }
    if (s.x < -10) { s.x = W+10; s.y = Math.random()*H; }
  }

}

  rocket:{x:0,y:0,w:50,h:75,tx:0,tilt:0},
  lives:3,
  eq:[false,false,false,false],
  eqEmoji:['🧊','🧑‍🚀','🕶️','🧴'],
  eqName:{pt:['Escudo de Gelo','Roupa Espacial','Óculos Solares','Protetor FPS 1M'],
          es:['Escudo de Hielo','Traje Espacial','Lentes Solares','Protector FPS 1M']},
  progress:0, objs:[], stars:[], inv:0,
  spawnT:0, bubbleT:0, alienT:0, blackHoleT:0, autoTurbo:0, autoTurboSpawnT:0,
  turbo:false, turboFuel:100, turboTrails:[],
  exploding:false, explodeT:0, particles:[], parachutes:[],

function startPhase2() {

  g.on = true; g.lives = 3; g.eq = [false,false,false,false];
  g.progress = 0; g.objs = []; g.inv = 0;
  g.spawnT = 0; g.bubbleT = 0; g.alienT = 0;
  g.turbo = false; g.turboFuel = 100; g.turboTrails = [];
  g.exploding = false; g.explodeT = 0; g.particles = []; g.parachutes = [];
  g.shieldAlpha = 0; g.landing = false; g.landingT = 0; g.sunMouth = 0;
  g.bullets = []; g.shootCD = 0; g.powerShot = 0;
  g.shake = 0; g.kills = 0; xp = 0; g.blackHoleT = 0; g.autoTurbo = 0; g.autoTurboSpawnT = 0;
  g.cv = document.getElementById('p2c');
  g.ctx = g.cv.getContext('2d');
  g.W = g.cv.width = innerWidth;
  g.H = g.cv.height = innerHeight;
  g.rocket.x = g.W/2; g.rocket.y = g.H*0.78;

  g.rocket.w = Math.min(54, g.W*0.13);
  g.rocket.h = g.rocket.w * 1.55;
  g.stars = [];
  for (var i=0; i<120; i++) g.stars.push({x:Math.random()*g.W, y:Math.random()*g.H, r:Math.random()*1.5+0.3, s:Math.random()*2+1});
  document.getElementById('crew').classList.add('on');

  updCrew(); p2Hud(); scr('phase2');
  // Request accelerometer on iOS
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function') requestAccel();
  // Request fullscreen on mobile
  var fsEl=document.documentElement;
  if(fsEl.requestFullscreen) fsEl.requestFullscreen().catch(function(){});
  else if(fsEl.webkitRequestFullscreen) fsEl.webkitRequestFullscreen();
  p2BGM();
  p2Msg(t('Terra → Sol! 🚀','¡Tierra → Sol! 🚀'), 2000);
  if (g.raf) cancelAnimationFrame(g.raf);

function p2Loop() {
  if(!p2.on)return;
  try{
    if(p2.exploding) { p2ExplodeUpd(); p2DrwBg(); p2DrawExplosion(); }
    else if(p2.landing) { p2LandUpd(); p2DrwBg(); p2DrawLanding(); }
    else { p2Upd(); p2Drw(); }
  }catch(e){console.error('p2Loop err:',e);}
  p2.raf=requestAnimationFrame(p2Loop);
}
function p2DrwBg(){

}

function p2Upd() {
  var g=p2, r=g.rocket;
  // Turbo boost
  var isTurbo = g.turbo && g.turboFuel > 0;
  if (isTurbo) { g.progress += 0.085; g.turboFuel = Math.max(0, g.turboFuel - 0.4); }
  else { g.progress += 0.028; g.turboFuel = Math.min(100, g.turboFuel + 0.15); }
  // Turbo speed trails
  if (isTurbo && Math.random() > 0.3) {
    g.turboTrails.push({x: r.x + (Math.random()-0.5)*r.w*0.8, y: r.y + r.h*0.6, a: 1, vy: 4+Math.random()*3});
  }
  for (var ti=g.turboTrails.length-1; ti>=0; ti--) {
    g.turboTrails[ti].y += g.turboTrails[ti].vy; g.turboTrails[ti].a -= 0.04;
    if (g.turboTrails[ti].a <= 0) g.turboTrails.splice(ti, 1);
  }
  // Update turbo fuel bar
  var fb = document.getElementById('p2fuel');
  if (fb) { fb.style.width = g.turboFuel + '%'; fb.style.background = g.turboFuel < 20 ? '#ff5e3a' : '#ffd93d'; }
  // Bullets update
  if(g.shootCD>0) g.shootCD--;
  var sb=document.getElementById('p2shoot');
  if(sb) {
    if(g.shootCD>0) sb.classList.add('cd'); else sb.classList.remove('cd');
    if(g.powerShot>0) {sb.classList.add('powered'); sb.textContent='⚡ FORTE';} else {sb.classList.remove('powered'); sb.textContent='💥 TIRO';}
  }
  var tb2=document.getElementById('p2turbo');
  if(tb2) {
    if(g.autoTurbo>0) {tb2.classList.add('active'); tb2.textContent='🔥 AUTO!';} else if(!p2.turbo) {tb2.classList.remove('active'); tb2.textContent='🔥 TURBO';}
  }
  for(var bi=g.bullets.length-1;bi>=0;bi--){
    var bu=g.bullets[bi]; bu.y-=bu.vy; if(bu.vx) bu.x+=bu.vx; bu.life--;
    if(bu.y<-20||bu.x<-20||bu.x>g.W+20||bu.life<=0){g.bullets.splice(bi,1);continue;}
    // Bullet-object collision
    var bRad=bu.power?12:8;
    for(var oi=g.objs.length-1;oi>=0;oi--){
      var o=g.objs[oi];
      if(o.tp==='b'||o.tp==='p'||o.tp==='t') continue; // don't destroy items/pickups!
      if(o.tp==='h') continue; // black hole absorbs bullets, can't be destroyed
      var bd=Math.sqrt((bu.x-o.x)*(bu.x-o.x)+(bu.y-o.y)*(bu.y-o.y));
      if(bd<o.r+bRad){
        // Destroy object! Power shots = bigger explosion
        var pCount=bu.power?20:12;
        for(var pi=0;pi<pCount;pi++){
          var pang=Math.random()*6.28, pspd=1.5+Math.random()*(bu.power?5:3);
          g.particles.push({x:o.x,y:o.y,vx:Math.cos(pang)*pspd,vy:Math.sin(pang)*pspd,
            r:2+Math.random()*(bu.power?6:4),life:1,c:bu.power?'#4ecdc4':(o.tp==='a'?'#8b7355':'#7ddf64')});
        }
        g.objs.splice(oi,1); g.bullets.splice(bi,1);
        g.kills++; addXP(bu.power?10:5);
        playTone(bu.power?440:880,'sine',0.05,bu.power?0.15:0.08);
        if(bu.power) g.shake=6;
        break;
      }
    }
  }
  if (g.progress>=100) { p2Sun(); return; }
  // Rocket follow
  var dx=r.tx-r.x; r.x+=dx*0.12; r.tilt=dx*0.15;
  if(r.tilt>15) r.tilt=15; if(r.tilt<-15) r.tilt=-15;
  if(r.x<r.w/2+10) r.x=r.w/2+10; if(r.x>g.W-r.w/2-10) r.x=g.W-r.w/2-10;
  // Turbo vertical wobble - ship vibrates and drifts up slightly
  if(isTurbo){
    r.y+=(g.H*0.62-r.y)*0.02+Math.sin(Date.now()*0.015)*1.2;
  } else {
    r.y+=(g.H*0.78-r.y)*0.04;
  }
  if(g.inv>0) g.inv--;
  // Spawn asteroids (gets MUCH harder near the sun)
  g.spawnT++;
  var heat=g.progress>60?(g.progress-60)/40:0; // 0-1 intensity in last 40%
  var sr=Math.max(15, 80-g.progress*0.5-heat*30);
  if(g.spawnT>=sr) {
    g.spawnT=0;
    var sz=14+Math.random()*18+heat*8;
    var astType=Math.floor(Math.random()*4); // 0=rocky, 1=icy, 2=metallic, 3=fiery
    g.objs.push({tp:'a', x:Math.random()*(g.W-40)+20, y:-30, r:sz,
      vy:2+Math.random()*2+g.progress*0.03+heat*2, vx:(Math.random()-0.5)*(1+heat*2),
      rot:Math.random()*6.28, rs:(Math.random()-0.5)*0.08, sub:astType});
  }
  // Spawn aliens (more frequent near the sun!)
  g.alienT++;
  var alienRate=Math.max(120, 280-g.progress*1.5);
  if(g.alienT>=alienRate+Math.random()*120) {
    g.alienT=0;
    var fl=Math.random()>0.5;
    var aspd=1.5+heat*1.5;
    var alienType=Math.floor(Math.random()*3); // 0=green, 1=purple, 2=red
    g.objs.push({tp:'x', x:fl?-20:g.W+20, y:Math.random()*g.H*0.5+60,
      r:18, vx:fl?aspd:-aspd, ph:Math.random()*6.28, sub:alienType});
  }
  // Spawn equipment bubbles
  g.bubbleT++;
  var allEq=g.eq[0]&&g.eq[1]&&g.eq[2]&&g.eq[3];
  if(!allEq && g.bubbleT>=160+Math.random()*100) {
    g.bubbleT=0;
    var miss=[]; for(var i=0;i<4;i++) if(!g.eq[i]) miss.push(i);
    g.objs.push({tp:'b', x:Math.random()*(g.W-60)+30, y:-30, r:22,
      vy:1.5+Math.random(), et:miss[Math.floor(Math.random()*miss.length)],
      ph:Math.random()*6.28});
  }
  // Spawn power shot pickup (rare!)
  if(!g.powerSpawnT) g.powerSpawnT=0;
  g.powerSpawnT++;
  if(g.powerShot<=0 && g.powerSpawnT>=400+Math.random()*300) {
    g.powerSpawnT=0;
    g.objs.push({tp:'p', x:Math.random()*(g.W-80)+40, y:-30, r:18,
      vy:1.2+Math.random()*0.8, ph:Math.random()*6.28});
  }
  // Power shot timer countdown
  if(g.powerShot>0) g.powerShot--;
  // Auto-turbo pickup spawn (when xp >= 60, rare)
  g.autoTurboSpawnT++;
  if(g.autoTurbo<=0 && xp>=60 && g.autoTurboSpawnT>=500+Math.random()*400) {
    g.autoTurboSpawnT=0;
    g.objs.push({tp:'t', x:Math.random()*(g.W-80)+40, y:-30, r:18, vy:1.1+Math.random()*0.6, ph:Math.random()*6.28});
  }
  // Black hole trap spawn (when xp >= 80 or progress > 45)
  g.blackHoleT++;
  var bhRate=xp>=120?350:(xp>=80?500:9999);
  if(g.blackHoleT>=bhRate+Math.random()*300) {
    g.blackHoleT=0;
    var bhSide=Math.random()>0.5;
    g.objs.push({tp:'h', x:bhSide?-30:g.W+30, y:Math.random()*g.H*0.55+80,
      r:26, vx:bhSide?0.7:-0.7, ph:0, rot:0});
  }
  // Auto-turbo active: force turbo on
  if(g.autoTurbo>0) { g.autoTurbo--; g.turbo=true; }
  // Update objects + collisions
  for(var i=g.objs.length-1; i>=0; i--) {
    var o=g.objs[i];
    if(o.tp==='a') { o.x+=o.vx; o.y+=o.vy; o.rot+=o.rs; if(o.y>g.H+40){g.objs.splice(i,1);continue;} }
    if(o.tp==='x') { o.x+=o.vx; o.ph+=0.07; o.y+=Math.sin(o.ph*2)*2.8+Math.cos(o.ph*1.3)*1.2; if(o.x>g.W+40||o.x<-40){g.objs.splice(i,1);continue;} }
    if(o.tp==='b') { o.y+=o.vy; o.ph+=0.05; o.x+=Math.sin(o.ph)*0.8; if(o.y>g.H+40){g.objs.splice(i,1);continue;} }
    if(o.tp==='p') { o.y+=o.vy; o.ph+=0.06; o.x+=Math.sin(o.ph)*1.2; if(o.y>g.H+40){g.objs.splice(i,1);continue;} }
    if(o.tp==='t') { o.y+=o.vy; o.ph+=0.06; o.x+=Math.sin(o.ph)*1.1; if(o.y>g.H+40){g.objs.splice(i,1);continue;} }
    if(o.tp==='h') {
      o.x+=o.vx; o.rot+=0.04;
      // Gravity pull: nudge rocket's target x toward black hole
      var bhDx=o.x-r.x, bhDy=o.y-r.y, bhDist=Math.sqrt(bhDx*bhDx+bhDy*bhDy);
      if(bhDist<180&&bhDist>0){ var pull=1.2*(1-bhDist/180); r.tx=Math.max(0,Math.min(g.W,r.tx+bhDx/bhDist*pull*8)); }
      if(o.x>g.W+60||o.x<-60){g.objs.splice(i,1);continue;}
    }
    var d=Math.sqrt((o.x-r.x)*(o.x-r.x)+(o.y-r.y)*(o.y-r.y));
    if(d < o.r+r.w*0.4) {
      if(o.tp==='a' && g.inv<=0) { g.objs.splice(i,1); p2Hit(); if(g.exploding) return; }
      if(o.tp==='x') { g.objs.splice(i,1); g.progress=Math.max(0,g.progress-5); snd('no'); p2Msg(t('👽 Empurrão!','👽 ¡Empujón!'),1200); }
      if(o.tp==='p') {
        g.objs.splice(i,1); g.powerShot=480; addXP(10); party();
        p2Msg('⚡ '+t('TIRO FORTE!','¡DISPARO FUERTE!'), 1800);
        // Power-up jingle
        playTone(523,'sine',0.08,0.12); setTimeout(function(){playTone(659,'sine',0.08,0.12);},80);
        setTimeout(function(){playTone(784,'sine',0.08,0.12);},160); setTimeout(function(){playTone(1047,'sine',0.1,0.2);},240);
        continue;
      }
      if(o.tp==='b') {
        var et=o.et; g.objs.splice(i,1);
        if(!g.eq[et]) {
          g.eq[et]=true; snd('ok'); addXP(15); party();
          p2Msg(g.eqEmoji[et]+' '+g.eqName[L][et]+'!', 1500); p2Hud();
          if(g.eq[0]&&g.eq[1]&&g.eq[2]&&g.eq[3]) setTimeout(function(){ p2Msg(t('Tudo pronto pro Sol! ☀️','¡Todo listo para el Sol! ☀️'),2000); },1600);
        }
      }
      if(o.tp==='t') {
        g.objs.splice(i,1); g.autoTurbo=600; addXP(10); party();
        p2Msg('🔥 '+t('TURBO AUTO!','¡TURBO AUTO!'), 1800);
        playTone(392,'sine',0.08,0.1); setTimeout(function(){playTone(523,'sine',0.08,0.1);},80);
        setTimeout(function(){playTone(659,'sine',0.08,0.1);},160); setTimeout(function(){playTone(880,'sine',0.1,0.2);},240);
        continue;
      }
      if(o.tp==='h' && g.inv<=0) { g.objs.splice(i,1); p2Hit(); p2Msg('🕳️ '+t('Buraco Negro!','¡Agujero Negro!'),1200); if(g.exploding) return; }
    }
  }
  // Stars scroll
  for(var i=0;i<g.stars.length;i++) { g.stars[i].y+=g.stars[i].s; if(g.stars[i].y>g.H){g.stars[i].y=-5;g.stars[i].x=Math.random()*g.W;} }
  document.getElementById('p2bf').style.height=g.progress+'%';
}

function p2Drw() {
  var g=p2, c=g.ctx, W=g.W, H=g.H, pr=g.progress/100;
  // Clear canvas fully BEFORE any transforms
  c.setTransform(1,0,0,1,0,0);
  var gr=c.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'rgb('+Math.round(5+pr*200)+','+Math.round(8+pr*120)+','+Math.round(22-pr*22)+')');
  gr.addColorStop(1,'rgb('+Math.round(5+pr*60)+','+Math.round(8+pr*30)+','+Math.round(22+pr*10)+')');
  c.fillStyle=gr; c.fillRect(0,0,W,H);
  // Screen shake (applied AFTER background clear)
  g._shaking=false;
  if(g.shake>0){
    g.shake--;
    var sx=(Math.random()-0.5)*g.shake*1.5, sy=(Math.random()-0.5)*g.shake*1.5;
    c.save(); c.translate(sx,sy);
    g._shaking=true;
  }
  // Stars
  var sa=1-pr*0.7;
  for(var i=0;i<g.stars.length;i++){var s=g.stars[i]; c.fillStyle='rgba(255,255,255,'+(sa*0.8)+')'; c.beginPath(); c.arc(s.x,s.y,s.r,0,6.28); c.fill();}
  // Earth at start
  if(g.progress<20){
    c.globalAlpha=1-g.progress/20;
    c.fillStyle='#4a9eff'; c.beginPath(); c.arc(W/2,H+60+g.progress*2,100,0,6.28); c.fill();
    c.fillStyle='#3a8e3a'; c.beginPath(); c.arc(W/2-20,H+40+g.progress*2,30,0,6.28); c.fill();
    c.beginPath(); c.arc(W/2+30,H+60+g.progress*2,25,0,6.28); c.fill();
    c.globalAlpha=1;
  }
  // Sun at end (based on Julia's drawing!)
  if(g.progress>70){
    var sa2=(g.progress-70)/30, sy=-60+(1-sa2)*60;
    var sr2=55+sa2*20; // sun radius grows as you approach
    c.globalAlpha=sa2;
    // Glow
    var sg=c.createRadialGradient(W/2,sy,sr2*0.3,W/2,sy,sr2*3);
    sg.addColorStop(0,'rgba(255,217,61,0.7)'); sg.addColorStop(0.4,'rgba(255,138,92,0.25)'); sg.addColorStop(1,'rgba(255,90,58,0)');
    c.fillStyle=sg; c.fillRect(0,0,W,H*0.5);
    // Spiky triangle rays (like Julia drew!)
    c.save(); c.translate(W/2,sy);
    var nRays=14, rayH=sr2*0.55;
    for(var ri=0;ri<nRays;ri++){
      var ang=ri*(6.28/nRays)+Math.sin(Date.now()*0.002+ri)*0.1;
      c.save(); c.rotate(ang);
      c.fillStyle='#ffb347';
      c.beginPath(); c.moveTo(-sr2*0.18,sr2); c.lineTo(0,sr2+rayH+Math.sin(Date.now()*0.004+ri*2)*6); c.lineTo(sr2*0.18,sr2); c.closePath(); c.fill();
      c.restore();
    }
    // Face circle
    c.fillStyle='#ffd93d'; c.strokeStyle='#e8a820'; c.lineWidth=3;
    c.beginPath(); c.arc(0,0,sr2,0,6.28); c.fill(); c.stroke();
    // Eyes (round with pupils, like Julia drew)
    var eyeX=sr2*0.28, eyeY=-sr2*0.12, eyeR=sr2*0.18;
    c.fillStyle='#fff'; c.strokeStyle='#333'; c.lineWidth=2.5;
    c.beginPath(); c.arc(-eyeX,eyeY,eyeR,0,6.28); c.fill(); c.stroke();
    c.beginPath(); c.arc(eyeX,eyeY,eyeR,0,6.28); c.fill(); c.stroke();
    // Pupils
    c.fillStyle='#1a1a2e';
    c.beginPath(); c.arc(-eyeX,eyeY,eyeR*0.45,0,6.28); c.fill();
    c.beginPath(); c.arc(eyeX,eyeY,eyeR*0.45,0,6.28); c.fill();
    // Glasses bridge (connects the two eyes like Julia drew)
    c.strokeStyle='#333'; c.lineWidth=2.5;
    c.beginPath(); c.moveTo(-eyeX+eyeR,eyeY); c.lineTo(eyeX-eyeR,eyeY); c.stroke();
    // Big toothy smile (like Julia drew!)
    var smY=sr2*0.28, smW=sr2*0.5, smH=sr2*0.28;
    c.fillStyle='#fff'; c.strokeStyle='#333'; c.lineWidth=2.5;
    c.beginPath(); c.moveTo(-smW,smY); c.quadraticCurveTo(0,smY+smH*2,smW,smY); c.lineTo(-smW,smY); c.fill(); c.stroke();
    // Teeth lines
    var nTeeth=5;
    for(var ti=1;ti<nTeeth;ti++){
      var tx=-smW+ti*(smW*2/nTeeth);
      c.beginPath(); c.moveTo(tx,smY); c.lineTo(tx,smY+smH*0.7); c.stroke();
    }
    // "SOL" text on top (like Julia wrote!)
    c.fillStyle='#333'; c.font='bold '+Math.round(sr2*0.3)+'px "Baloo 2",cursive';
    c.textAlign='center'; c.textBaseline='bottom';
    c.fillText('SOL',0,-sr2-rayH*0.3);
    c.restore();
    c.globalAlpha=1;
  }
  // Objects
  for(var i=0;i<g.objs.length;i++){
    var o=g.objs[i];
    if(o.tp==='a'){
      c.save(); c.translate(o.x,o.y); c.rotate(o.rot);
      var st=o.sub||0;
      if(st===0){ // Rocky brown
        c.fillStyle='#8b7355'; c.beginPath(); c.arc(0,0,o.r,0,6.28); c.fill();
        c.fillStyle='#6b5335'; c.beginPath(); c.arc(-o.r*.3,-o.r*.2,o.r*.25,0,6.28); c.fill();

      } else if(st===1){ // Icy blue - jagged

      } else if(st===2){ // Metallic silver - angular
        c.fillStyle='#9a9aaa'; c.strokeStyle='#666'; c.lineWidth=2;

        for(var si=0;si<6;si++){var sa=si*1.047,sr2=o.r*(0.85+((si%2)*0.2));c.lineTo(Math.cos(sa)*sr2,Math.sin(sa)*sr2);}
        c.closePath(); c.fill(); c.stroke();
        c.strokeStyle='#bbb'; c.lineWidth=1;
        c.beginPath(); c.moveTo(-o.r*.2,-o.r*.3); c.lineTo(o.r*.3,o.r*.2); c.stroke();
        c.beginPath(); c.moveTo(o.r*.1,-o.r*.4); c.lineTo(-o.r*.2,o.r*.3); c.stroke();
      } else { // Fiery red (near sun!)

        // Fire particles around it

    }
    if(o.tp==='x'){
      var at=o.sub||0;
      var alienCol=at===0?'#7ddf64':(at===1?'#b380e0':'#f0905a');

        c.strokeStyle=alienCol; c.lineWidth=2;

      } else if(at===1){ // Purple - big single eye, tentacles
        c.fillStyle='#fff'; c.beginPath(); c.arc(o.x,o.y-2,o.r*0.5,0,6.28); c.fill();
        c.fillStyle='#6a0dad'; c.beginPath(); c.arc(o.x,o.y-2,o.r*0.25,0,6.28); c.fill();
        // Tentacles
        c.strokeStyle='#9060c0'; c.lineWidth=2;
        for(var ti=0;ti<3;ti++){

          c.beginPath(); c.moveTo(o.x+ta*o.r*0.6,o.y+o.r*0.7);
          c.quadraticCurveTo(o.x+ta*o.r*0.6+tw,o.y+o.r*1.3,o.x+ta*o.r*0.6-tw,o.y+o.r*1.6); c.stroke();
        }
      } else { // Orange angry alien - spiky antenna, angry eyes, fang mouth
        // Two spiky antennae with balls on top (alien-style, not horns)
        c.fillStyle='#c05020'; c.strokeStyle='#c05020'; c.lineWidth=2;
        c.beginPath(); c.moveTo(o.x-5,o.y-o.r*0.85); c.lineTo(o.x-9,o.y-o.r*1.55); c.stroke();
        c.beginPath(); c.moveTo(o.x+5,o.y-o.r*0.85); c.lineTo(o.x+9,o.y-o.r*1.55); c.stroke();
        c.fillStyle='#ff3300';
        c.beginPath(); c.arc(o.x-9,o.y-o.r*1.55,3.5,0,6.28); c.fill();

        // Eyes - alien yellow/lime (not devil!)

        c.fillStyle='#222';
        c.beginPath(); c.arc(o.x-5,o.y-1,2,0,6.28); c.fill();
        c.beginPath(); c.arc(o.x+5,o.y-1,2,0,6.28); c.fill();
        // Furrowed eyebrows (flat/angry, not V-devil)
        c.strokeStyle='#6b3500'; c.lineWidth=2.5;
        c.beginPath(); c.moveTo(o.x-9,o.y-7); c.lineTo(o.x-1,o.y-6); c.stroke();
        c.beginPath(); c.moveTo(o.x+9,o.y-7); c.lineTo(o.x+1,o.y-6); c.stroke();
        // Simple grumpy downward mouth (no fangs)
        c.strokeStyle='#6b3500'; c.lineWidth=2.5;
        c.beginPath(); c.arc(o.x,o.y+9,5,Math.PI*0.15,Math.PI*0.85); c.stroke();
      }
    }
    if(o.tp==='b'){
      var bp=Date.now()*0.003+o.ph;
      var pulse=0.85+Math.sin(bp)*0.15;
      var bR=Math.max(0.1,o.r*pulse);
      var eqCols=[
        {bg:'rgba(130,220,255,',glow:'#82dcff',ring:'#4ecdc4'}, // Ice shield - cyan
        {bg:'rgba(255,200,100,',glow:'#ffc864',ring:'#ffd93d'}, // Space suit - gold
        {bg:'rgba(200,130,255,',glow:'#c882ff',ring:'#a855f7'}, // Sunglasses - purple
        {bg:'rgba(255,130,180,',glow:'#ff82b4',ring:'#ff69b4'}  // Sunscreen - pink
      ];
      var ec=eqCols[o.et];
      // BIG green "safe" outer glow to distinguish from dangers
      var safeG=c.createRadialGradient(o.x,o.y,bR*0.5,o.x,o.y,bR*2.2);
      safeG.addColorStop(0,'rgba(100,255,150,0.25)'); safeG.addColorStop(1,'rgba(100,255,150,0)');
      c.fillStyle=safeG; c.beginPath(); c.arc(o.x,o.y,bR*2.2,0,6.28); c.fill();
      // Green protective ring (clearly "good")
      c.strokeStyle='rgba(100,255,150,0.6)'; c.lineWidth=3; c.setLineDash([4,4]);
      c.beginPath(); c.arc(o.x,o.y,bR*1.5,bp*2,bp*2+5); c.stroke();
      c.setLineDash([]);
      // Upward arrow above to signal "collect me!"
      var arrY=o.y-bR*1.8+Math.sin(Date.now()*0.008)*4;
      c.fillStyle='rgba(100,255,150,0.8)';
      c.beginPath(); c.moveTo(o.x,arrY-6); c.lineTo(o.x-5,arrY); c.lineTo(o.x+5,arrY); c.closePath(); c.fill();
      // Rotating sparkle particles
      for(var pi=0;pi<4;pi++){
        var pa=Date.now()*0.003+pi*1.57+o.ph;
        c.fillStyle=ec.bg+'0.7)';
        c.beginPath(); c.arc(o.x+Math.cos(pa)*bR*1.3,o.y+Math.sin(pa)*bR*1.3,3,0,6.28); c.fill();
      }
      // Inner colored glow
      var bg=c.createRadialGradient(o.x,o.y,bR*0.2,o.x,o.y,bR*1.1);
      bg.addColorStop(0,ec.bg+'0.6)'); bg.addColorStop(1,ec.bg+'0)');
      c.fillStyle=bg; c.beginPath(); c.arc(o.x,o.y,bR*1.1,0,6.28); c.fill();
      // Colored ring
      c.strokeStyle=ec.ring; c.lineWidth=2.5;
      c.beginPath(); c.arc(o.x,o.y,bR,0,6.28); c.stroke();
      // Inner fill
      c.fillStyle=ec.bg+'0.4)';
      c.beginPath(); c.arc(o.x,o.y,bR-2,0,6.28); c.fill();
      // Shine
      c.fillStyle='rgba(255,255,255,0.5)'; c.beginPath(); c.arc(o.x-bR*.25,o.y-bR*.25,bR*.22,0,6.28); c.fill();
      // Emoji (bigger!)
      c.font='bold '+Math.round(bR*1.0)+'px serif'; c.textAlign='center'; c.textBaseline='middle';
      c.fillText(g.eqEmoji[o.et],o.x,o.y+1);
    }
    // Power shot pickup - CYAN/electric blue (same team as bullets = good!)
    if(o.tp==='p'){
      var pp2=Date.now()*0.005+o.ph;
      var pR=Math.max(0.1,o.r*(0.9+Math.sin(pp2)*0.1));
      // Same green safe glow as equipment (= GOOD / collect me!)
      var safeG2=c.createRadialGradient(o.x,o.y,pR*0.5,o.x,o.y,pR*2.2);
      safeG2.addColorStop(0,'rgba(100,255,150,0.3)'); safeG2.addColorStop(1,'rgba(100,255,150,0)');
      c.fillStyle=safeG2; c.beginPath(); c.arc(o.x,o.y,pR*2.2,0,6.28); c.fill();
      // Cyan electric glow core
      var pg=c.createRadialGradient(o.x,o.y,pR*0.3,o.x,o.y,pR*1.5);
      pg.addColorStop(0,'rgba(78,205,196,0.5)'); pg.addColorStop(1,'rgba(78,205,196,0)');
      c.fillStyle=pg; c.beginPath(); c.arc(o.x,o.y,pR*1.5,0,6.28); c.fill();
      // Electric sparks (cyan)
      c.strokeStyle='rgba(78,205,196,0.8)'; c.lineWidth=1.5;
      for(var si=0;si<6;si++){
        var sa=pp2*1.5+si*1.05;
        var sx1=o.x+Math.cos(sa)*pR*1.1, sy1=o.y+Math.sin(sa)*pR*1.1;
        var sx2=o.x+Math.cos(sa)*pR*1.7+(Math.random()-0.5)*4, sy2=o.y+Math.sin(sa)*pR*1.7+(Math.random()-0.5)*4;
        c.beginPath(); c.moveTo(sx1,sy1); c.lineTo(sx2,sy2); c.stroke();
      }
      // Core: cyan
      c.fillStyle='#4ecdc4'; c.beginPath(); c.arc(o.x,o.y,pR,0,6.28); c.fill();
      c.fillStyle='#fff'; c.beginPath(); c.arc(o.x,o.y,pR*0.6,0,6.28); c.fill();
      // Lightning bolt emoji
      c.font='bold '+Math.round(pR*1.1)+'px serif'; c.textAlign='center'; c.textBaseline='middle';
      c.fillText('⚡',o.x,o.y+1);
      // Upward arrow (same as equipment)
      var arrY2=o.y-pR*1.8+Math.sin(Date.now()*0.008)*4;
      c.fillStyle='rgba(100,255,150,0.8)';
      c.beginPath(); c.moveTo(o.x,arrY2-6); c.lineTo(o.x-5,arrY2); c.lineTo(o.x+5,arrY2); c.closePath(); c.fill();
    }
    // Auto-turbo pickup - orange/fire (good: green glow)
    if(o.tp==='t'){
      var tp2=Date.now()*0.005+o.ph;
      var tR=Math.max(0.1,o.r*(0.9+Math.sin(tp2)*0.1));
      var safeGt=c.createRadialGradient(o.x,o.y,tR*0.5,o.x,o.y,tR*2.2);
      safeGt.addColorStop(0,'rgba(100,255,150,0.3)'); safeGt.addColorStop(1,'rgba(100,255,150,0)');
      c.fillStyle=safeGt; c.beginPath(); c.arc(o.x,o.y,tR*2.2,0,6.28); c.fill();
      var tg=c.createRadialGradient(o.x,o.y,tR*0.3,o.x,o.y,tR*1.5);
      tg.addColorStop(0,'rgba(255,140,30,0.55)'); tg.addColorStop(1,'rgba(255,80,0,0)');
      c.fillStyle=tg; c.beginPath(); c.arc(o.x,o.y,tR*1.5,0,6.28); c.fill();
      c.fillStyle='#ff8c1e'; c.beginPath(); c.arc(o.x,o.y,tR,0,6.28); c.fill();
      c.fillStyle='#ffe040'; c.beginPath(); c.arc(o.x,o.y,tR*0.55,0,6.28); c.fill();
      c.font='bold '+Math.round(tR*1.1)+'px serif'; c.textAlign='center'; c.textBaseline='middle';
      c.fillText('🔥',o.x,o.y+1);
      var arrYt=o.y-tR*1.8+Math.sin(Date.now()*0.008)*4;
      c.fillStyle='rgba(100,255,150,0.8)';
      c.beginPath(); c.moveTo(o.x,arrYt-6); c.lineTo(o.x-5,arrYt); c.lineTo(o.x+5,arrYt); c.closePath(); c.fill();
    }
    // Black hole trap - dangerous (red warning glow)
    if(o.tp==='h'){
      var ht=Date.now()*0.003, hr=o.r;
      // Danger red outer warning glow
      var bhDng=c.createRadialGradient(o.x,o.y,hr,o.x,o.y,hr*3.5);
      bhDng.addColorStop(0,'rgba(180,0,255,0.25)'); bhDng.addColorStop(0.6,'rgba(255,0,80,0.08)'); bhDng.addColorStop(1,'rgba(0,0,0,0)');
      c.fillStyle=bhDng; c.beginPath(); c.arc(o.x,o.y,hr*3.5,0,6.28); c.fill();
      // Rotating accretion disk rings
      for(var ri=0;ri<3;ri++){
        var ra=ht*(1.5-ri*0.3)+o.rot, rr=hr*(1.4+ri*0.35);
        c.save(); c.translate(o.x,o.y); c.rotate(ra); c.scale(1,0.35);
        var rc=c.createRadialGradient(0,0,rr*0.7,0,0,rr);
        var col=ri===0?'rgba(255,160,30,0.5)':ri===1?'rgba(200,80,255,0.4)':'rgba(80,180,255,0.3)';
        rc.addColorStop(0,col);
        rc.addColorStop(1,'rgba(0,0,0,0)');
        c.fillStyle=rc; c.beginPath(); c.arc(0,0,rr,0,6.28); c.fill();
        c.restore();
      }
      // Event horizon (black core)
      var bhCore=c.createRadialGradient(o.x,o.y,0,o.x,o.y,hr);
      bhCore.addColorStop(0,'rgba(0,0,0,1)'); bhCore.addColorStop(0.7,'rgba(10,0,20,1)'); bhCore.addColorStop(1,'rgba(80,0,120,0.6)');
      c.fillStyle=bhCore; c.beginPath(); c.arc(o.x,o.y,hr,0,6.28); c.fill();
      // Spiral arms
      c.strokeStyle='rgba(160,0,255,0.5)'; c.lineWidth=1.5;
      for(var si2=0;si2<4;si2++){
        var sa2=ht*2+si2*1.57;
        c.beginPath();
        for(var sk=0;sk<12;sk++){
          var sk_r=hr*(0.9+sk*0.12), sk_a=sa2+sk*0.25;
          var sx=o.x+Math.cos(sk_a)*sk_r, sy=o.y+Math.sin(sk_a)*sk_r;
          if(sk===0) c.moveTo(sx,sy); else c.lineTo(sx,sy);
        }
        c.stroke();
      }
      // Warning symbol
      c.font='bold '+Math.round(hr*0.9)+'px serif'; c.textAlign='center'; c.textBaseline='middle';
      c.fillStyle='rgba(180,0,255,0.7)'; c.fillText('🕳️',o.x,o.y);
    }
  }
  // Heat vignette near sun
  if(g.progress>60){
    var hv=(g.progress-60)/40;
    var vg=c.createRadialGradient(W/2,H/2,W*0.2,W/2,H/2,W*0.7);
    vg.addColorStop(0,'rgba(255,90,58,0)'); vg.addColorStop(1,'rgba(255,60,30,'+hv*0.2+')');
    c.fillStyle=vg; c.fillRect(0,0,W,H);
  }
  // Turbo speed trails
  for(var ti=0;ti<g.turboTrails.length;ti++){
    var tt=g.turboTrails[ti];
    c.fillStyle='rgba(255,217,61,'+tt.a*0.6+')';
    c.fillRect(tt.x-1,tt.y,2,8+Math.random()*4);
  }
  // Shield glow around rocket (grows with each equipment!)
  var eqCount=0; for(var ei=0;ei<4;ei++) if(g.eq[ei]) eqCount++;
  if(eqCount>0 && g.inv<=0){
    var shR=Math.max(1,g.rocket.h*0.7+eqCount*6);
    var shCols=['rgba(130,220,255,','rgba(100,255,180,','rgba(255,217,61,','rgba(255,130,255,'];
    var shPulse=0.15+Math.sin(Date.now()*0.004)*0.1;
    for(var ei=0;ei<eqCount;ei++){
      c.strokeStyle=shCols[ei]+(shPulse*(1-ei*0.15))+')'; c.lineWidth=2;
      c.beginPath(); c.arc(g.rocket.x,g.rocket.y,shR+ei*5,0,6.28); c.stroke();
    }
    // Inner glow
    var shG=c.createRadialGradient(g.rocket.x,g.rocket.y,shR*0.3,g.rocket.x,g.rocket.y,shR);
    shG.addColorStop(0,'rgba(130,220,255,0)'); shG.addColorStop(1,'rgba(130,220,255,'+(shPulse*0.3)+')');
    c.fillStyle=shG; c.beginPath(); c.arc(g.rocket.x,g.rocket.y,shR,0,6.28); c.fill();
  }
  // Draw hit particles (small explosions on non-fatal hits)
  for(var pi=g.particles.length-1;pi>=0;pi--){
    var pp=g.particles[pi];
    pp.x+=pp.vx; pp.y+=pp.vy; pp.life-=0.03;
    if(pp.grav) pp.vy+=pp.grav;
    if(pp.life<=0){g.particles.splice(pi,1);continue;}
    var pRad=Math.max(0.1,pp.r*pp.life);
    c.globalAlpha=Math.max(0,pp.life); c.fillStyle=pp.c;
    c.beginPath(); c.arc(pp.x,pp.y,pRad,0,6.28); c.fill();
  }
  c.globalAlpha=1;
  // Bullets
  for(var bi=0;bi<g.bullets.length;bi++){
    var bu=g.bullets[bi];
    if(bu.power) {
      // Power bullets: bright white-cyan (same family as normal, but BIGGER)
      c.fillStyle='#fff'; c.shadowColor='#4ecdc4'; c.shadowBlur=18;
      c.beginPath(); c.arc(bu.x,bu.y,7,0,6.28); c.fill();
      c.fillStyle='#4ecdc4'; c.beginPath(); c.arc(bu.x,bu.y,4,0,6.28); c.fill();
      c.fillStyle='#fff'; c.beginPath(); c.arc(bu.x,bu.y,2,0,6.28); c.fill();
      c.shadowBlur=0;
      c.fillStyle='rgba(78,205,196,0.5)'; c.fillRect(bu.x-3,bu.y+7,6,18);
    } else {
      c.fillStyle='#4ecdc4'; c.shadowColor='#4ecdc4'; c.shadowBlur=8;
      c.beginPath(); c.arc(bu.x,bu.y,4,0,6.28); c.fill();
      c.fillStyle='#fff'; c.beginPath(); c.arc(bu.x,bu.y,2,0,6.28); c.fill();
      c.shadowBlur=0;
      c.fillStyle='rgba(78,205,196,0.3)'; c.fillRect(bu.x-1.5,bu.y+4,3,12);
    }
  }
  // Power shot timer bar
  if(g.powerShot>0){
    var pwPct=g.powerShot/480;
    c.fillStyle='rgba(78,205,196,0.2)'; c.fillRect(10,g.H-8,g.W-20,4);
    c.fillStyle='#4ecdc4'; c.fillRect(10,g.H-8,(g.W-20)*pwPct,4);
    c.fillStyle='rgba(78,205,196,0.9)'; c.font='bold 11px "Baloo 2",cursive';
    c.textAlign='center'; c.fillText('⚡ '+t('TIRO FORTE','DISPARO FUERTE'),g.W/2,g.H-12);
  }
  // Rocket (based on Julia's drawing!)
  p2Rocket(c, g.rocket);
  // Kill counter (bottom-left, above buttons)
  if(g.kills>0){
    var fontSize=Math.round(Math.min(14,g.W*0.03));
    c.font='bold '+fontSize+'px "Baloo 2",cursive'; c.textAlign='left'; c.textBaseline='bottom';
    c.fillStyle='rgba(78,205,196,0.7)';
    c.fillText('💥 '+g.kills,12,g.H-80);
  }
  // Keep HUD XP in sync every frame
  var xpEl=document.getElementById('p2xp'); if(xpEl) xpEl.textContent='⭐ '+xp;
  // End screen shake
  if(g.shake>0||g._shaking) { c.restore(); g._shaking=false; }
}

function p2Rocket(c, r) {
  var x=r.x, y=r.y, w=r.w, h=r.h, hw=w/2, hh=h/2;
  c.save(); c.translate(x,y); c.rotate(r.tilt*Math.PI/180);
  if(p2.inv>0 && Math.floor(p2.inv/4)%2===0) c.globalAlpha=0.4;
  // Flames (animated, bigger during turbo)
  var ft=Date.now()*0.01, isTb=p2.turbo&&p2.turboFuel>0;
  var fMul=isTb?2.2:1, fCount=isTb?6:4;
  for(var fi=0;fi<fCount;fi++){
    var fx=-hw*0.55+fi*hw*(1.1/fCount);

    c.beginPath(); c.moveTo(fx-w*0.06,hh); c.quadraticCurveTo(fx,hh+fh,fx+w*0.06,hh); c.fill();
  }
  // Body
  c.fillStyle='#e8e8f0'; c.strokeStyle='#555'; c.lineWidth=2;
  c.beginPath(); c.moveTo(-hw,-hh*0.3); c.lineTo(-hw,hh); c.lineTo(hw,hh); c.lineTo(hw,-hh*0.3); c.closePath(); c.fill(); c.stroke();

  c.beginPath(); c.moveTo(-hw,hh*0.3); c.lineTo(-hw-w*0.3,hh+h*0.04); c.lineTo(-hw,hh); c.closePath(); c.fill(); c.stroke();
  // Right fin
  c.beginPath(); c.moveTo(hw,hh*0.3); c.lineTo(hw+w*0.3,hh+h*0.04); c.lineTo(hw,hh); c.closePath(); c.fill(); c.stroke();
  // Country stripe on body
  var stripeCol=P==='julia'?'#FFDF00':'rgba(255,255,255,0.6)';
  c.fillStyle=stripeCol; c.fillRect(-hw,hh*0.55,w*2,h*0.06);
  // Window 1 - Julia (top porthole)
  var wy1=-hh*0.05;
  c.fillStyle='#8fd4ff'; c.strokeStyle='#555'; c.lineWidth=2;
  c.beginPath(); c.arc(0,wy1,w*0.19,0,6.28); c.fill(); c.stroke();
  c.fillStyle='#f5d0b0'; c.beginPath(); c.arc(0,wy1,w*0.13,0,6.28); c.fill(); // face
  c.fillStyle='#1a1a2e'; c.beginPath(); c.arc(-w*0.04,wy1-w*0.02,1.5,0,6.28); c.fill();
  c.beginPath(); c.arc(w*0.04,wy1-w*0.02,1.5,0,6.28); c.fill();
  c.strokeStyle='#c48a5a'; c.lineWidth=1; c.beginPath(); c.arc(0,wy1+w*0.03,w*0.05,0,Math.PI); c.stroke();
  // Window 2 - Ninna (bottom porthole)
  var wy2=hh*0.38;
  c.fillStyle='#8fd4ff'; c.strokeStyle='#555'; c.lineWidth=2;
  c.beginPath(); c.arc(0,wy2,w*0.19,0,6.28); c.fill(); c.stroke();
  c.fillStyle='#f5d0b0'; c.beginPath(); c.arc(0,wy2,w*0.13,0,6.28); c.fill();
  c.fillStyle='#1a1a2e'; c.beginPath(); c.arc(-w*0.04,wy2-w*0.02,1.5,0,6.28); c.fill();
  c.beginPath(); c.arc(w*0.04,wy2-w*0.02,1.5,0,6.28); c.fill();
  c.strokeStyle='#c48a5a'; c.lineWidth=1; c.beginPath(); c.arc(0,wy2+w*0.03,w*0.05,0,Math.PI); c.stroke();
  c.restore();
}

function p2StartExplode() {
  // Full explosion: pieces fly out, girls with parachutes!
  var g=p2, r=g.rocket;
  g.exploding=true; g.explodeT=0; g.particles=[]; g.parachutes=[];
  // Rocket debris (metal pieces, fins, nose)
  var cols=['#e8e8f0','#d0d0dd','#ff5e3a','#555','#8fd4ff'];
  for(var i=0;i<35;i++){
    var ang=Math.random()*6.28, spd=3+Math.random()*6;
    g.particles.push({x:r.x,y:r.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2,
      r:3+Math.random()*8,life:1,c:cols[Math.floor(Math.random()*cols.length)],
      rot:Math.random()*6.28,rs:(Math.random()-0.5)*0.2,grav:0.08});
  }
  // Fire/spark particles
  for(var i=0;i<25;i++){
    var ang=Math.random()*6.28, spd=1+Math.random()*3;
    g.particles.push({x:r.x+Math.random()*20-10,y:r.y+Math.random()*20-10,
      vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-1,
      r:2+Math.random()*4,life:1,c:Math.random()>0.3?'#ffd93d':'#ff5e3a',
      rot:0,rs:0,grav:0.02,fire:true});
  }
  // Julia and Ninna fly out with parachutes!
  g.parachutes.push({x:r.x-15,y:r.y,vx:-1.5-Math.random(),vy:-4,name:'Julia',open:false,openT:0});
  g.parachutes.push({x:r.x+15,y:r.y,vx:1.5+Math.random(),vy:-4,name:'Ninna',open:false,openT:0});
  // Explosion sound
  if(AC){try{
    var now=AC.currentTime;
    // White noise burst
    var buf=AC.createBuffer(1,AC.sampleRate*0.3,AC.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*5);
    var src=AC.createBufferSource(),g2=AC.createGain();
    src.buffer=buf;src.connect(g2);g2.connect(AC.destination);
    g2.gain.setValueAtTime(0.15,now);g2.gain.exponentialRampToValueAtTime(0.001,now+0.4);
    src.start(now);
    // Low boom
    var o=AC.createOscillator(),og=AC.createGain();
    o.connect(og);og.connect(AC.destination);
    o.frequency.setValueAtTime(80,now);o.frequency.exponentialRampToValueAtTime(20,now+0.3);
    og.gain.setValueAtTime(0.12,now);og.gain.exponentialRampToValueAtTime(0.001,now+0.4);
    o.start(now);o.stop(now+0.5);
  }catch(e){}}
}

function p2ExplodeUpd() {
  var g=p2; g.explodeT++;
  // Update debris
  for(var i=g.particles.length-1;i>=0;i--){
    var p=g.particles[i];
    p.x+=p.vx; p.y+=p.vy;
    if(p.grav) p.vy+=p.grav;
    if(p.rot!==undefined) p.rot+=p.rs;
    p.life-=p.fire?0.025:0.012;
    if(p.life<=0){g.particles.splice(i,1);continue;}
  }
  // Update parachute girls
  for(var i=0;i<g.parachutes.length;i++){
    var pp=g.parachutes[i];
    pp.x+=pp.vx; pp.y+=pp.vy;
    if(!pp.open && g.explodeT>25){pp.open=true;pp.openT=0;}
    if(pp.open){pp.vy+= pp.vy>1.2?0:-0.3+0.02; pp.vx*=0.98; pp.openT++;}
    else{pp.vy+=0.15;}
  }
  // After 180 frames (~3s), go to game over
  if(g.explodeT>180) p2Over();
}

function p2DrawExplosion() {
  var g=p2, c=g.ctx;
  // Flash on first frames
  if(g.explodeT<8){
    c.globalAlpha=(8-g.explodeT)/8*0.6;
    c.fillStyle='#fff'; c.fillRect(0,0,g.W,g.H);
    c.globalAlpha=1;
  }
  // Debris particles
  for(var i=0;i<g.particles.length;i++){
    var p=g.particles[i];
    if(p.life<=0) continue;
    c.globalAlpha=Math.max(0,p.life);
    if(p.fire){
      c.fillStyle=p.c; c.beginPath(); c.arc(p.x,p.y,Math.max(0.1,p.r*p.life),0,6.28); c.fill();
    } else {
      c.save(); c.translate(p.x,p.y); if(p.rot) c.rotate(p.rot);
      c.fillStyle=p.c; c.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.7);
      c.restore();
    }
  }
  c.globalAlpha=1;
  // Parachute girls!
  for(var i=0;i<g.parachutes.length;i++){
    var pp=g.parachutes[i], sz=12;
    // Parachute canopy
    if(pp.open){
      var canR=22+Math.min(pp.openT*0.5,15);
      c.fillStyle=i===0?'#ff69b4':'#a855f7'; // pink for Julia, purple for Ninna
      c.beginPath(); c.arc(pp.x,pp.y-sz-canR+5,canR,Math.PI,0); c.fill();
      c.strokeStyle='rgba(255,255,255,0.6)'; c.lineWidth=1;
      c.beginPath(); c.moveTo(pp.x-canR,pp.y-sz-canR+5); c.lineTo(pp.x-4,pp.y-sz+4); c.stroke();
      c.beginPath(); c.moveTo(pp.x+canR,pp.y-sz-canR+5); c.lineTo(pp.x+4,pp.y-sz+4); c.stroke();
      c.beginPath(); c.moveTo(pp.x,pp.y-sz-canR+5-canR); c.lineTo(pp.x,pp.y-sz+4); c.stroke();
    }
    // Girl body (simple cute)
    c.fillStyle='#f5d0b0'; c.beginPath(); c.arc(pp.x,pp.y-sz,sz*0.6,0,6.28); c.fill(); // head
    c.fillStyle='#1a1a2e'; // eyes
    c.beginPath(); c.arc(pp.x-3,pp.y-sz-1,1.5,0,6.28); c.fill();
    c.beginPath(); c.arc(pp.x+3,pp.y-sz-1,1.5,0,6.28); c.fill();
    c.strokeStyle='#c48a5a'; c.lineWidth=1; c.beginPath(); c.arc(pp.x,pp.y-sz+3,3,0,Math.PI); c.stroke(); // smile
    // Hair
    c.fillStyle=i===0?'#3a2010':'#5a3020';
    c.beginPath(); c.arc(pp.x,pp.y-sz-2,sz*0.65,Math.PI,0); c.fill();
    // Body/dress
    c.fillStyle=i===0?'#ff69b4':'#a855f7';
    c.fillRect(pp.x-5,pp.y-sz+sz*0.6,10,12);
    // Arms waving!
    var wave=Math.sin(Date.now()*0.008+i*3)*0.4;
    c.strokeStyle='#f5d0b0'; c.lineWidth=2;
    c.beginPath(); c.moveTo(pp.x-5,pp.y-sz+sz*0.6+3); c.lineTo(pp.x-12,pp.y-sz+wave*8); c.stroke();
    c.beginPath(); c.moveTo(pp.x+5,pp.y-sz+sz*0.6+3); c.lineTo(pp.x+12,pp.y-sz-wave*8); c.stroke();
    // Name label
    c.fillStyle='#fff'; c.font='bold 10px "Baloo 2",cursive'; c.textAlign='center';
    c.fillText(pp.name,pp.x,pp.y+12);
  }
}

// Landing sequence: sun opens mouth, rocket flies in!
function p2LandUpd() {
  var g=p2; g.landingT++;
  // Sun mouth opens gradually
  if(g.landingT<80) g.sunMouth=g.landingT/80;
  // Sun comes DOWN to the rocket! Store sun landing Y
  var meetY=g.rocket.y-g.rocket.h*0.5;
  if(!g.sunLandY) g.sunLandY=-60;
  g.sunLandY+=(meetY-g.sunLandY)*0.025;
  // Rocket centers horizontally, stays mostly in place
  g.rocket.x+=(g.W/2-g.rocket.x)*0.04;
  g.rocket.tilt*=0.95;
  // Scale down as sun envelops rocket
  if(g.landingT>100) {
    g.rocket.w*=0.985; g.rocket.h*=0.985;
  }
  // After ~150 frames, victory!
  if(g.landingT>150) p2Win();
}

function p2DrawLanding() {
  var g=p2, c=g.ctx, W=g.W, H=g.H;
  // Sun descends to meet the rocket!
  var sy=g.sunLandY||0, sr2=75+g.landingT*0.2;
  c.globalAlpha=1;
  // Extra glow
  var sg=c.createRadialGradient(W/2,sy,sr2*0.3,W/2,sy,sr2*3.5);
  sg.addColorStop(0,'rgba(255,217,61,0.9)'); sg.addColorStop(0.4,'rgba(255,138,92,0.3)'); sg.addColorStop(1,'rgba(255,90,58,0)');
  c.fillStyle=sg; c.fillRect(0,0,W,H*0.6);
  // Rays
  for(var ri=0;ri<14;ri++){
    var ang=ri*(6.28/14)+Math.sin(Date.now()*0.002+ri)*0.1;
    var rx=W/2+Math.cos(ang)*sr2, ry=sy+Math.sin(ang)*sr2;
    var rh=sr2*0.55+Math.sin(Date.now()*0.004+ri*2)*6;
    c.fillStyle='rgba(255,179,71,'+(0.5+Math.sin(Date.now()*0.003+ri)*0.3)+')';
    c.beginPath();
    c.moveTo(W/2+Math.cos(ang-0.2)*sr2,sy+Math.sin(ang-0.2)*sr2);
    c.lineTo(W/2+Math.cos(ang)*(sr2+rh),sy+Math.sin(ang)*(sr2+rh));
    c.lineTo(W/2+Math.cos(ang+0.2)*sr2,sy+Math.sin(ang+0.2)*sr2);
    c.closePath(); c.fill();
  }
  // Sun face
  c.fillStyle='#ffd93d'; c.strokeStyle='#e8a820'; c.lineWidth=3;
  c.beginPath(); c.arc(W/2,sy,sr2,0,6.28); c.fill(); c.stroke();
  // Eyes (happy/excited)
  var eX=sr2*0.28, eY=sr2*0.1, eR=sr2*0.18;
  c.fillStyle='#fff'; c.strokeStyle='#333'; c.lineWidth=2.5;
  c.beginPath(); c.arc(W/2-eX,sy-eY,eR,0,6.28); c.fill(); c.stroke();
  c.beginPath(); c.arc(W/2+eX,sy-eY,eR,0,6.28); c.fill(); c.stroke();
  c.fillStyle='#1a1a2e';
  c.beginPath(); c.arc(W/2-eX,sy-eY,eR*0.45,0,6.28); c.fill();
  c.beginPath(); c.arc(W/2+eX,sy-eY,eR*0.45,0,6.28); c.fill();
  c.strokeStyle='#333'; c.lineWidth=2.5;
  c.beginPath(); c.moveTo(W/2-eX+eR,sy-eY); c.lineTo(W/2+eX-eR,sy-eY); c.stroke();
  // MOUTH OPENS! (based on landingT)
  var mouthOpen=g.sunMouth; // 0 to 1
  var mY=sy+sr2*0.22, mW=sr2*0.5, mH=sr2*0.15+mouthOpen*sr2*0.4;
  c.fillStyle='#c44'; c.strokeStyle='#333'; c.lineWidth=2.5;
  c.beginPath();
  c.moveTo(W/2-mW,mY);
  c.quadraticCurveTo(W/2,mY+mH*2,W/2+mW,mY);
  c.quadraticCurveTo(W/2,mY-mH*0.3*mouthOpen,W/2-mW,mY);
  c.fill(); c.stroke();
  // Teeth (top)
  if(mouthOpen>0.3){
    c.fillStyle='#fff';
    var nT=5, tH=mH*0.3;
    for(var ti=0;ti<nT;ti++){
      var tx=W/2-mW+ti*(mW*2/(nT-1));
      var tw=mW*2/nT*0.6;
      // curve Y at this x
      var frac=(tx-(W/2-mW))/(mW*2);
      var curveY=mY+Math.sin(frac*Math.PI)*mH*0.15;
      c.fillRect(tx-tw/2,curveY,tw,tH);
    }
  }
  // "SOL" above
  c.fillStyle='rgba(255,255,255,0.8)'; c.font='bold '+Math.round(sr2*0.3)+'px "Baloo 2",cursive';
  c.textAlign='center'; c.textBaseline='bottom';
  c.fillText('SOL',W/2,sy-sr2-sr2*0.2);
  // Landing message
  if(g.landingT>30 && g.landingT<120){
    c.fillStyle='#fff'; c.font='bold '+Math.round(Math.min(28,g.W*0.05))+'px "Baloo 2",cursive';
    c.textAlign='center'; c.textBaseline='middle';
    c.shadowColor='rgba(0,0,0,0.6)'; c.shadowBlur=8;
    c.fillText(t('Pousando no Sol! ☀️','¡Aterrizando en el Sol! ☀️'),W/2,H*0.65);
    c.shadowBlur=0;
  }
  // Draw rocket on top
  p2Rocket(c, g.rocket);
}

      o.type='sine'; o.frequency.value=sadMel[i];
      g.gain.setValueAtTime(0.04,now+sadT+i*0.35);
      g.gain.exponentialRampToValueAtTime(0.001,now+sadT+i*0.35+0.3);
      o.start(now+sadT+i*0.35);o.stop(now+sadT+i*0.35+0.4);
    }
  }catch(e){}}
}

function p2Hud() {
  var h=''; for(var i=0;i<3;i++) h+=(i<p2.lives?'❤️':'🖤');
  document.getElementById('p2lives').textContent=h;
  var e=''; for(var i=0;i<4;i++) e+='<div class="p2-eq'+(p2.eq[i]?' got':'')+'">'+p2.eqEmoji[i]+'</div>';
  document.getElementById('p2equip').innerHTML=e;
  document.getElementById('p2xp').textContent='⭐ '+xp;
}

function p2Msg(text,dur) {
  var el=document.getElementById('p2msg'); el.textContent=text; el.classList.add('show');
  clearTimeout(p2.msgT); p2.msgT=setTimeout(function(){el.classList.remove('show');},dur);
}

// Phase 2 touch/mouse/keyboard controls
var moveTouchId = null;
function isButtonTouch(t) {
  var el=t.target;
  while(el){if(el.id==='p2shoot'||el.id==='p2turbo')return true;el=el.parentElement;}
  return false;
}
// TOUCHSTART: only register ID — single tap does NOT move rocket
document.addEventListener('touchstart',function(e){
  if(!p2.on)return;
  e.preventDefault();
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    if(!isButtonTouch(t)&&moveTouchId===null){
      moveTouchId=t.identifier;
      // No rocket.tx update here — only dragging (touchmove) moves the rocket
      break;
    }
  }
},{passive:false});
// TOUCHMOVE: move rocket only while dragging
document.addEventListener('touchmove',function(e){
  if(!p2.on)return;
  e.preventDefault();
  for(var i=0;i<e.touches.length;i++){
    if(e.touches[i].identifier===moveTouchId){
      p2.rocket.tx=e.touches[i].clientX;
      break;
    }
  }
},{passive:false});
// TOUCHEND/CANCEL: release ID, reset accel baseline so it doesn't jump
function releaseMoveTouch(e){
  for(var i=0;i<e.changedTouches.length;i++){
    if(e.changedTouches[i].identifier===moveTouchId){
      moveTouchId=null;
      accelBaseline=null; // re-calibrate after finger lifts
      break;
    }
  }
}
document.addEventListener('touchend',releaseMoveTouch);
document.addEventListener('touchcancel',releaseMoveTouch);
document.addEventListener('mousemove',function(e){
  if(!p2.on)return;
  if(e.sourceCapabilities&&e.sourceCapabilities.firesTouchEvents)return;
  p2.rocket.tx=e.clientX;
});
document.addEventListener('keydown',function(e){
  if(!p2.on)return;
  if(e.key==='ArrowLeft') p2.rocket.tx=p2.rocket.x-50;
  if(e.key==='ArrowRight') p2.rocket.tx=p2.rocket.x+50;
  if(e.key==='ArrowUp') p2.turbo=true;
  if(e.key===' '||e.key==='Spacebar') { e.preventDefault(); p2Shoot(); }
});
document.addEventListener('keyup',function(e){
  if(e.key==='ArrowUp') p2.turbo=false;
});
// Turbo touch button
(function(){
  var tb=document.getElementById('p2turbo');
  tb.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();if(p2.on){p2.turbo=true;tb.classList.add('active');}},{passive:false});
  tb.addEventListener('touchend',function(e){e.stopPropagation();p2.turbo=false;tb.classList.remove('active');});
  tb.addEventListener('mousedown',function(e){e.preventDefault();if(p2.on){p2.turbo=true;tb.classList.add('active');}});
  tb.addEventListener('mouseup',function(){p2.turbo=false;tb.classList.remove('active');});
})();
// Shoot touch button
(function(){
  var sb=document.getElementById('p2shoot');
  sb.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();p2Shoot();},{passive:false});
  sb.addEventListener('mousedown',function(e){e.preventDefault();p2Shoot();});
})();

// ============== ACCELEROMETER CONTROL ==============
var accelEnabled = false;
var accelBaseline = null;
function requestAccel() {
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    // iOS 13+ requires permission
    DeviceMotionEvent.requestPermission().then(function(s){ if(s==='granted') enableAccel(); }).catch(function(){});
  } else {
    enableAccel();
  }
}
function enableAccel() {
  accelEnabled = true; accelBaseline = null;
  window.addEventListener('deviceorientation', function(e) {
    if (!p2.on || !accelEnabled) return;
    // Pause accel while finger is dragging — avoid fighting with touch
    if (moveTouchId !== null) { accelBaseline = null; return; }
    if (accelBaseline === null) accelBaseline = e.gamma;
    var tilt = (e.gamma - accelBaseline);
    var deadzone = 4;
    if (Math.abs(tilt) > deadzone) {
      var move = (tilt - (tilt>0?deadzone:-deadzone)) * 5;
      // Accumulate on tx (not x) for smoother response
      p2.rocket.tx = Math.max(0, Math.min(p2.W, p2.rocket.tx + move));
    }
  }, true);
}
// Auto-try on game start (non-iOS) or show hint
(function(){
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission !== 'function') {
    enableAccel(); // Android and non-iOS - just enable
  }
})();

// Prevent context menu (long-press) and scroll during game
document.addEventListener('contextmenu',function(e){if(p2.on)e.preventDefault();});

// ============== PWA SERVICE WORKER ==============
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(){});
}

// ============== PHASE 2 EPIC BGM ==============
function p2BGM() {
  if(!AC||p2.bgmOn)return;
  p2.bgmOn=true;
  if(AC.state==='suspended') AC.resume();
  if(bgGain) bgGain.gain.value=0; // silence Phase 1 BGM
  var bpm=140, ms=60000/bpm, ni=0, turboAccum=0;
  var mel=[294,349,440,392,349,294,262,294,349,392,440,523,494,440,392,349];
  var bas=[147,147,175,175,196,196,131,131,147,147,175,175,196,196,131,131];
  // Epic melody for sun zone (higher, more intense)
  var melHot=[392,440,523,587,523,440,523,587,659,587,523,494,523,587,659,784];
  var basHot=[196,196,220,220,262,262,196,196,220,220,262,262,294,294,262,262];
  if(p2.bgmInt)clearInterval(p2.bgmInt);
  p2.bgmInt=setInterval(function(){
    if(muted||!AC||!p2.on)return;
    // Turbo = play 2 notes per tick (double time!)
    var isTurbo=p2.turbo&&p2.turboFuel>0;
    var notesThisTick=isTurbo?2:1;
    for(var nt=0;nt<notesThisTick;nt++){
    try{
      var heat=p2.progress>60?Math.min(1,(p2.progress-60)/40):0;
      var now=AC.currentTime+nt*(ms/2000);
      var n=ni%mel.length;
      var curMel=heat>0.3?melHot:mel, curBas=heat>0.3?basHot:bas;
      var pitchMul=isTurbo?1.12:1; // slightly higher pitch during turbo
      var volBoost=(1+heat*0.6)*(isTurbo?1.15:1);
      // Melody
      var o=AC.createOscillator(),g=AC.createGain(),f=AC.createBiquadFilter();
      f.type='lowpass';f.frequency.value=1200+heat*2000; o.connect(f);f.connect(g);g.connect(AC.destination);
      o.type='square'; o.frequency.value=curMel[n]*pitchMul;
      g.gain.setValueAtTime(0.055*volBoost,now); g.gain.exponentialRampToValueAtTime(0.001,now+ms/1000*0.9);
      o.start(now);o.stop(now+ms/1000);
      // Harmony
      var h=AC.createOscillator(),hg=AC.createGain();
      h.connect(hg);hg.connect(AC.destination);
      h.type='triangle'; h.frequency.value=curMel[n]*1.5*pitchMul;
      hg.gain.setValueAtTime(0.02*volBoost,now); hg.gain.exponentialRampToValueAtTime(0.001,now+ms/1000*0.6);
      h.start(now);h.stop(now+ms/1000);
      // Bass (heavier near sun)
      var b=AC.createOscillator(),bg2=AC.createGain(),bf=AC.createBiquadFilter();
      bf.type='lowpass';bf.frequency.value=400+heat*200; b.connect(bf);bf.connect(bg2);bg2.connect(AC.destination);
      b.type='sawtooth'; b.frequency.value=curBas[n];
      bg2.gain.setValueAtTime((0.04+heat*0.03)*volBoost,now); bg2.gain.exponentialRampToValueAtTime(0.001,now+ms/1000*0.8);
      b.start(now);b.stop(now+ms/1000);
      // Kick - every 4 beats normally, every 2 near sun
      var kickEvery=heat>0.5?2:4;
      if(n%kickEvery===0){
        var k=AC.createOscillator(),kg=AC.createGain();
        k.connect(kg);kg.connect(AC.destination);
        k.frequency.setValueAtTime(150+heat*50,now);k.frequency.exponentialRampToValueAtTime(30,now+0.1);
        kg.gain.setValueAtTime((0.07+heat*0.04)*volBoost,now);kg.gain.exponentialRampToValueAtTime(0.001,now+0.15);
        k.start(now);k.stop(now+0.2);
      }
      // Hi-hat - every 2 normally, every 1 near sun
      var hhEvery=heat>0.5?1:2;
      if(n%hhEvery===0){
        var hh2=AC.createOscillator(),hhg=AC.createGain(),hhf=AC.createBiquadFilter();
        hhf.type='highpass';hhf.frequency.value=8000;
        hh2.connect(hhf);hhf.connect(hhg);hhg.connect(AC.destination);
        hh2.type='sawtooth';hh2.frequency.value=6000+Math.random()*2000;
        hhg.gain.setValueAtTime((0.012+heat*0.008)*volBoost,now);hhg.gain.exponentialRampToValueAtTime(0.001,now+0.04);
        hh2.start(now);hh2.stop(now+0.06);
      }
      // Extra: dramatic string pad near sun
      if(heat>0.4 && n%8===0){
        var s=AC.createOscillator(),sg2=AC.createGain();
        s.connect(sg2);sg2.connect(AC.destination);
        s.type='sine'; s.frequency.value=curMel[n]*0.5;
        sg2.gain.setValueAtTime(0.03*heat,now); sg2.gain.exponentialRampToValueAtTime(0.001,now+ms/1000*3);
        s.start(now);s.stop(now+ms/1000*4);
      }
      ni++;
    }catch(e){}
    } // end notesThisTick loop
  }, ms);
}

function p2StopBGM() {
  p2.bgmOn=false;
  if(p2.bgmInt){clearInterval(p2.bgmInt);p2.bgmInt=null;}
  if(bgGain) bgGain.gain.value=muted?0:0.055;
}
