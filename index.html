<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050816;color:#fff;font-family:'Baloo 2',cursive;user-select:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.scr{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:2;padding:16px}
.scr.on{display:flex}
.xp-pop{position:fixed;z-index:200;font-size:2rem;font-weight:800;pointer-events:none;animation:xpUp 1.2s ease-out forwards;color:#ffd93d;text-shadow:0 0 20px rgba(255,217,61,.6)}
@keyframes xpUp{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-50px) scale(1.4)}100%{opacity:0;transform:translateY(-90px) scale(.7)}}
.conf{position:fixed;z-index:199;pointer-events:none;font-size:1.5rem;animation:cF 1.4s ease-out forwards}
@keyframes cF{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100px) rotate(300deg) scale(.5)}}
.mute{position:fixed;top:10px;right:10px;z-index:99;font-size:1.4rem;background:rgba(255,255,255,.08);border:none;border-radius:50%;width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}
#welcome{gap:20px;text-align:center}
.ws{font-size:min(20vw,100px);animation:bob 2.5s ease-in-out infinite}

.wt{font-size:clamp(2rem,8vw,4rem);line-height:1;background:linear-gradient(135deg,#ffd93d,#ff5e3a,#ff6b9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wu{font-size:clamp(.9rem,3vw,1.15rem);color:rgba(255,255,255,.5);max-width:300px;line-height:1.3}
.btn-main{font-size:clamp(1.3rem,5.5vw,1.9rem);border:none;border-radius:60px;padding:16px 46px;cursor:pointer;background:linear-gradient(135deg,#ff5e3a,#ff6b9d);color:#fff;box-shadow:0 4px 30px rgba(255,90,58,.4);transition:.2s;animation:gP 2s ease-in-out infinite alternate}

.intro-dots{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}

.pk-g.rdy{opacity:1;pointer-events:auto;animation:gP 2s ease-in-out infinite alternate}

#travel{padding:0;overflow:hidden}

.crew{position:fixed;top:8px;left:10px;z-index:40;display:none;align-items:center;gap:5px;background:rgba(5,8,22,.75);border-radius:28px;padding:4px 12px 4px 6px}.crew.on{display:flex}
.cxp{font-size:.9rem;color:#ffd93d;font-weight:800}

.dots{display:flex;gap:6px}
.dt{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.1);transition:.4s}
.dt.now{background:#ffd93d;box-shadow:0 0 8px rgba(255,217,61,.5);transform:scale(1.35)}.dt.dn{background:#4ecdc4}
.nb{font-size:clamp(1.2rem,4.5vw,1.6rem);border:none;border-radius:50px;padding:14px 40px;cursor:pointer;background:linear-gradient(135deg,#6ec6ff,#c471f5);color:#fff;box-shadow:0 4px 20px rgba(110,198,255,.3);transition:.2s}.nb:active{transform:scale(.92)}
#quiz{gap:14px;text-align:center}
.qa{font-size:clamp(1.15rem,4.2vw,1.6rem);max-width:400px;line-height:1.3}
.qg{display:flex;flex-direction:column;gap:10px;max-width:340px;width:100%}
.qo{display:flex;align-items:center;gap:12px;padding:15px 18px;border-radius:20px;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.08);cursor:pointer;transition:.25s;font-size:clamp(1.05rem,3.5vw,1.3rem);font-weight:700}
.qo:active{transform:scale(.95)}
.qo.ok{border-color:#4ecdc4;background:rgba(78,205,196,.18)}.qo.no{border-color:#e74c3c;background:rgba(231,76,60,.12);animation:sk .5s}
@keyframes sk{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.qf{font-size:clamp(.9rem,2.8vw,1.1rem);font-weight:700;min-height:1em;max-width:350px;line-height:1.3}
.qnn{font-size:.75rem;color:rgba(255,255,255,.3)}
#final{gap:14px;text-align:center;padding:20px;overflow-y:auto}
.f-big{font-size:min(18vw,100px);animation:bob 3s ease-in-out infinite}
.f-t{font-size:clamp(1.5rem,6vw,2.6rem);background:linear-gradient(135deg,#ffd93d,#ff5e3a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.f-s{font-size:clamp(1rem,3vw,1.3rem);color:#6ec6ff}
.f-bx{background:rgba(255,217,61,.06);border:2px solid rgba(255,217,61,.18);border-radius:20px;padding:14px 22px;max-width:320px;width:100%}
.f-bx-t{color:#ffd93d;font-size:1rem;margin-bottom:3px}.f-bx-n{font-size:1.4rem}
.f-c{background:linear-gradient(135deg,rgba(196,113,245,.1),rgba(110,198,255,.1));border:2px solid rgba(196,113,245,.22);border-radius:20px;padding:14px 20px;max-width:320px;font-size:clamp(.88rem,2.7vw,1.05rem);line-height:1.5;text-align:center}
.f-l{font-size:clamp(.8rem,2.2vw,.9rem);color:rgba(255,255,255,.32);font-style:italic}
.f-btn{font-size:clamp(1.1rem,4vw,1.4rem);border:none;border-radius:50px;padding:12px 34px;cursor:pointer;background:linear-gradient(135deg,#ff5e3a,#ff6b9d);color:#fff;transition:.2s}.f-btn:active{transform:scale(.92)}
#phases{gap:20px;text-align:center;overflow-y:auto}.ph-t{font-size:clamp(1.3rem,5vw,2rem);color:#ffd93d}.ph-sub{font-size:clamp(.85rem,2.8vw,1rem);color:rgba(255,255,255,.45)}
.ph-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.ph-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 24px;border-radius:24px;background:rgba(255,255,255,.04);border:3px solid rgba(255,255,255,.08);cursor:pointer;transition:.3s;min-width:130px}.ph-card:active{transform:scale(.94)}
.ph-ico{font-size:2.5rem}.ph-nm{font-size:1.05rem;font-weight:700}.ph-by{font-size:.75rem;color:rgba(255,255,255,.35)}
#phase2{padding:0}#p2c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:3}
.p2-hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;pointer-events:none}
.p2-lives{font-size:1.5rem;text-shadow:0 2px 8px rgba(0,0,0,.5)}.p2-equip{display:flex;gap:6px}
.p2-eq{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:.3s}
.p2-eq.got{border-color:#4ecdc4;background:rgba(78,205,196,.25);box-shadow:0 0 10px rgba(78,205,196,.3)}
.p2-bar{position:fixed;right:10px;top:55px;bottom:30px;width:10px;border-radius:5px;background:rgba(255,255,255,.06);z-index:10;pointer-events:none}
.p2-bar-fill{position:absolute;bottom:0;left:0;right:0;border-radius:5px;background:linear-gradient(to top,#4a9eff,#ffd93d);transition:height .3s}
.p2-bar-e{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:.85rem}.p2-bar-s{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:.85rem}
.p2-msg{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);z-index:20;font-size:clamp(1.2rem,4vw,1.8rem);font-weight:800;text-align:center;pointer-events:none;opacity:0;transition:opacity .4s;text-shadow:0 2px 12px rgba(0,0,0,.7)}
.p2-msg.show{opacity:1}
</style>

<body>
<canvas id="c"></canvas>
<button class="mute" id="muteBtn">🔊</button>

<div id="welcome" class="scr on">
  <div class="ws">🚀</div>
  <div class="wt">Viagem nas Estrelas</div>
  <div class="wu">Um jogo feito só pra Ninna e Julia!</div>
  <button class="btn-main" id="startBtn">Começar ✨</button>
</div>

<div id="intro" class="scr"></div>

<div id="pick" class="scr">
  <div class="pk-t">Quem é você? 🧑‍🚀</div>
  <div class="pk-r">
    <div class="pk-c" id="cN"><div id="aN"></div><div class="pk-n">Ninna</div><div class="pk-f">🇦🇷</div></div>
    <div class="pk-c" id="cJ"><div id="aJ"></div><div class="pk-n">Julia</div><div class="pk-f">🇧🇷</div></div>
  </div>
  <button class="pk-g" id="pkG">🚀</button>
</div>

<div id="travel" class="scr">
  <div class="warp" id="warp"></div>
  <div class="crew" id="crew"></div>
  <div class="stg" id="stg"></div>
  <div class="bb" id="bb"></div>
</div>

<div id="quiz" class="scr"></div>
<div id="final" class="scr"></div>
<div id="phases" class="scr"></div>
<div id="phase2" class="scr">
  <canvas id="p2c"></canvas>
  <div class="p2-hud">
    <div class="p2-lives" id="p2lives"></div>
    <div class="p2-equip" id="p2equip"></div>
  </div>
  <div class="p2-bar">
    <div class="p2-bar-fill" id="p2bf"></div>
    <div class="p2-bar-s">☀️</div>
    <div class="p2-bar-e">🌍</div>
  </div>
  <div class="p2-msg" id="p2msg"></div>
</div>

<script>
// ============== AUDIO via silent HTML Audio element + Web Audio ==============
// iOS Safari requires: 1) Audio element played on user gesture, 2) AudioContext created on user gesture
var AC = null;
var silentAudio = null;
var muted = false;
var bgOn = false;
var bgGain = null;
var audioUnlocked = false;

// Create a tiny silent WAV as data URI for iOS unlock
var silentWav = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=';

function unlockAudio() {
  if (audioUnlocked) return;
  try {
    // Method 1: HTML Audio element (iOS needs this)
    silentAudio = new Audio(silentWav);
    silentAudio.setAttribute('playsinline', '');
    silentAudio.volume = 0.01;
    var p = silentAudio.play();
    if (p && p.then) p.then(function(){}).catch(function(){});

    // Method 2: Web Audio API
    AC = new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();

    // Method 3: Create and immediately play a silent buffer
    var buf = AC.createBuffer(1, 1, AC.sampleRate);
    var src = AC.createBufferSource();
    src.buffer = buf;
    src.connect(AC.destination);
    src.start(0);

    audioUnlocked = true;
    console.log('Audio unlocked, state:', AC.state);
  } catch(e) {
    console.log('Audio unlock error:', e);
  }
}

function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
  if (bgGain) bgGain.gain.value = muted ? 0 : 0.055;
}

document.getElementById('muteBtn').addEventListener('click', function() {
  unlockAudio();
  toggleMute();
});

function startBGM() {
  if (bgOn || !AC) return;
  bgOn = true;
  if (AC.state === 'suspended') AC.resume();
  bgGain = AC.createGain();
  bgGain.gain.value = muted ? 0 : 0.055;
  bgGain.connect(AC.destination);
  var notes = [261.6,329.6,392,523.2,392,329.6,261.6,196,261.6,329.6,392,440,392,329.6,293.6,261.6];
  var ni = 0;
  function tick() {
    try {
      if (!muted && AC && AC.state === 'running') {
        var now = AC.currentTime;
        var o = AC.createOscillator();
        var g = AC.createGain();
        var f = AC.createBiquadFilter();
        f.type = 'lowpass'; f.frequency.value = 900;
        o.connect(f); f.connect(g); g.connect(bgGain);
        o.type = 'sine'; o.frequency.value = notes[ni % notes.length];
        g.gain.setValueAtTime(0.45, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
        o.start(now); o.stop(now + 2);
        var h = AC.createOscillator();
        var hg = AC.createGain();
        h.connect(hg); hg.connect(bgGain);
        h.type = 'triangle'; h.frequency.value = notes[ni % notes.length] * 1.498;
        hg.gain.setValueAtTime(0.1, now);
        hg.gain.exponentialRampToValueAtTime(0.001, now + 1.4);
        h.start(now + 0.05); h.stop(now + 1.5);
      }
      ni++;
    } catch(e) {}
    setTimeout(tick, 1900);
  }
  tick();
  try {
    var pad = AC.createOscillator();
    var pg = AC.createGain();
    var pf = AC.createBiquadFilter();
    pf.type = 'lowpass'; pf.frequency.value = 350;
    pad.connect(pf); pf.connect(pg); pg.connect(bgGain);
    pad.type = 'sine'; pad.frequency.value = 130.8; pg.gain.value = 0.25;
    pad.start();
  } catch(e) {}
}

function playTone(freq, type, vol, dur) {
  if (!AC || muted) return;
  try {
    if (AC.state === 'suspended') AC.resume();
    var o = AC.createOscillator();
    var g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.frequency.value = freq; o.type = type || 'sine';
    g.gain.setValueAtTime(vol || 0.1, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.start(AC.currentTime); o.stop(AC.currentTime + dur + 0.05);
  } catch(e) {}
}

function snd(tp) {
  if (muted || !AC) return;
  try {
    if (AC.state === 'suspended') AC.resume();
    if (!bgOn) startBGM();
    if (tp === 'click') playTone(660, 'sine', 0.12, 0.08);
    if (tp === 'warp') { playTone(150, 'sawtooth', 0.07, 0.6); setTimeout(function(){ playTone(450, 'sine', 0.06, 0.3) }, 200); }
    if (tp === 'land') { [440,554,660].forEach(function(f,i){ setTimeout(function(){ playTone(f, 'sine', 0.1, 0.18) }, i*90) }) }
    if (tp === 'ok') { [523,659,784].forEach(function(f,i){ setTimeout(function(){ playTone(f, 'sine', 0.11, 0.2) }, i*100) }) }
    if (tp === 'no') playTone(250, 'square', 0.06, 0.2);
    if (tp === 'win') { [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){ playTone(f, 'sine', 0.12, 0.3) }, i*150) }) }
    if (tp === 'intro') { playTone(392, 'sine', 0.09, 0.35); setTimeout(function(){ playTone(523, 'sine', 0.08, 0.3) }, 180); }
  } catch(e) {}
}

// ============== AVATARS ==============
function ava(w, big) {
  var sz = big ? 80 : 28, skin = '#f5d0b0', hair = '#1a1a2e';
  var jersey = w === 'nina'
    ? '<path d="M22 60Q20 62 18 80L28 82L28 70Q28 64 40 64Q52 64 52 70L52 82L62 80Q60 62 58 60Q50 56 40 56Q30 56 22 60Z" fill="#fff"/><line x1="18" y1="63.5" x2="62" y2="63.5" stroke="#75b8e8" stroke-width="2.6"/><line x1="18" y1="68.5" x2="62" y2="68.5" stroke="#75b8e8" stroke-width="2.6"/><line x1="18" y1="73.5" x2="62" y2="73.5" stroke="#75b8e8" stroke-width="2.6"/><line x1="18" y1="78.5" x2="62" y2="78.5" stroke="#75b8e8" stroke-width="2.6"/>'
    : '<path d="M22 60Q20 62 18 80L28 82L28 70Q28 64 40 64Q52 64 52 70L52 82L62 80Q60 62 58 60Q50 56 40 56Q30 56 22 60Z" fill="#f7e04b"/><path d="M22 60Q30 56 40 56Q50 56 58 60" stroke="#1b7340" stroke-width="3" fill="none"/><path d="M30 63L40 79L50 63" stroke="#1b7340" stroke-width="2.2" fill="none"/><circle cx="40" cy="70" r="3.2" fill="#1b7340"/>';
  return '<svg viewBox="0 0 80 100" width="'+sz+'" height="'+Math.round(sz*1.25)+'"><ellipse cx="40" cy="32" rx="26" ry="28" fill="'+hair+'"/><ellipse cx="40" cy="38" rx="20" ry="22" fill="'+skin+'"/><path d="M20 30Q25 12 40 12Q55 12 60 30Q58 22 40 20Q22 22 20 30Z" fill="'+hair+'"/><path d="M18 34Q14 55 22 72" stroke="'+hair+'" stroke-width="7" fill="none" stroke-linecap="round"/><path d="M62 34Q66 55 58 72" stroke="'+hair+'" stroke-width="7" fill="none" stroke-linecap="round"/><ellipse cx="33" cy="38" rx="3" ry="3.5" fill="'+hair+'"/><ellipse cx="47" cy="38" rx="3" ry="3.5" fill="'+hair+'"/><circle cx="34" cy="37" r="1.1" fill="#fff"/><circle cx="48" cy="37" r="1.1" fill="#fff"/><path d="M34 47Q40 53 46 47" stroke="#c48a5a" stroke-width="1.8" fill="none" stroke-linecap="round"/><ellipse cx="27" cy="43" rx="3.5" ry="2" fill="rgba(255,130,130,.18)"/><ellipse cx="53" cy="43" rx="3.5" ry="2" fill="rgba(255,130,130,.18)"/>'+jersey+'</svg>';
}
document.getElementById('aN').innerHTML = ava('nina', true);
document.getElementById('aJ').innerHTML = ava('julia', true);

// ============== CANVAS ==============
var cv = document.getElementById('c'), ctx = cv.getContext('2d'), W, H, ss = [], wOn = false;
function initC() { W = cv.width = innerWidth; H = cv.height = innerHeight; ss = []; for (var i = 0; i < 200; i++) ss.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.5+.3, v:Math.random()*1+.2, o:Math.random()}) }
function draw() {
  ctx.fillStyle = 'rgba(5,8,22,.22)'; ctx.fillRect(0,0,W,H);
  for (var i = 0; i < ss.length; i++) {
    var s = ss[i];
    if (wOn) { s.x -= s.v*30; ctx.strokeStyle = 'rgba(180,210,255,'+s.o*0.5+')'; ctx.lineWidth = s.r; ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x+s.v*40, s.y); ctx.stroke(); }
    else { s.x -= s.v*0.25; s.o += Math.sin(Date.now()*s.v*0.003)*0.01; if(s.o<0.1)s.o=0.1; if(s.o>1)s.o=1; ctx.fillStyle = 'rgba(255,255,255,'+s.o+')'; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.28); ctx.fill(); }
    if (s.x < -10) { s.x = W+10; s.y = Math.random()*H; }
  }
  requestAnimationFrame(draw);
}

var p2 = {
  on:false, cv:null, ctx:null, W:0, H:0,
  rocket:{x:0,y:0,w:50,h:75,tx:0,tilt:0},
  lives:3,
  eq:[false,false,false,false],
  eqEmoji:['🧊','🧑‍🚀','🕶️','🧴'],
  eqName:{pt:['Escudo de Gelo','Roupa Espacial','Óculos Solares','Protetor FPS 1M'],
          es:['Escudo de Hielo','Traje Espacial','Lentes Solares','Protector FPS 1M']},
  progress:0, objs:[], stars:[], inv:0,
  spawnT:0, bubbleT:0, alienT:0,
  raf:null, bgmOn:false, bgmInt:null, msgT:null
};

function startPhase2() {
  var g = p2;
  g.on = true; g.lives = 3; g.eq = [false,false,false,false];
  g.progress = 0; g.objs = []; g.inv = 0;
  g.spawnT = 0; g.bubbleT = 0; g.alienT = 0;
  g.cv = document.getElementById('p2c');
  g.ctx = g.cv.getContext('2d');
  g.W = g.cv.width = innerWidth;
  g.H = g.cv.height = innerHeight;
  g.rocket.x = g.W/2; g.rocket.y = g.H*0.78;
  g.rocket.tx = g.W/2;
  g.rocket.w = Math.min(54, g.W*0.13);
  g.rocket.h = g.rocket.w * 1.55;
  g.stars = [];
  for (var i=0; i<120; i++) g.stars.push({x:Math.random()*g.W, y:Math.random()*g.H, r:Math.random()*1.5+0.3, s:Math.random()*2+1});
  document.getElementById('crew').classList.add('on');
  updCrew(); p2Hud(); scr('phase2');
  p2BGM();
  p2Msg(t('Terra → Sol! 🚀','¡Tierra → Sol! 🚀'), 2000);
  if (g.raf) cancelAnimationFrame(g.raf);
  g.raf = requestAnimationFrame(p2Loop);
}

function p2Loop() { if(!p2.on)return; p2Upd(); p2Drw(); p2.raf=requestAnimationFrame(p2Loop); }

function p2Upd() {
  var g=p2, r=g.rocket;
  g.progress += 0.028;
  if (g.progress>=100) { p2Sun(); return; }
  // Rocket follow
  var dx=r.tx-r.x; r.x+=dx*0.12; r.tilt=dx*0.15;
  if(r.tilt>15) r.tilt=15; if(r.tilt<-15) r.tilt=-15;
  if(r.x<r.w/2+10) r.x=r.w/2+10; if(r.x>g.W-r.w/2-10) r.x=g.W-r.w/2-10;
  if(g.inv>0) g.inv--;
  // Spawn asteroids
  g.spawnT++;
  var sr=Math.max(40, 80-g.progress*0.35);
  if(g.spawnT>=sr) {
    g.spawnT=0;
    var sz=14+Math.random()*18;
    g.objs.push({tp:'a', x:Math.random()*(g.W-40)+20, y:-30, r:sz,
      vy:2+Math.random()*2+g.progress*0.02, vx:(Math.random()-0.5)*1,
      rot:Math.random()*6.28, rs:(Math.random()-0.5)*0.05});
  }
  // Spawn aliens
  g.alienT++;
  if(g.alienT>=280+Math.random()*200) {
    g.alienT=0;
    var fl=Math.random()>0.5;
    g.objs.push({tp:'x', x:fl?-20:g.W+20, y:Math.random()*g.H*0.5+60,
      r:18, vx:fl?1.5:-1.5, ph:Math.random()*6.28});
  }
  // Spawn equipment bubbles
  g.bubbleT++;
  var allEq=g.eq[0]&&g.eq[1]&&g.eq[2]&&g.eq[3];
  if(!allEq && g.bubbleT>=160+Math.random()*100) {
    g.bubbleT=0;
    var miss=[]; for(var i=0;i<4;i++) if(!g.eq[i]) miss.push(i);
    g.objs.push({tp:'b', x:Math.random()*(g.W-60)+30, y:-30, r:22,
      vy:1.5+Math.random(), et:miss[Math.floor(Math.random()*miss.length)],
      ph:Math.random()*6.28});
  }
  // Update objects + collisions
  for(var i=g.objs.length-1; i>=0; i--) {
    var o=g.objs[i];
    if(o.tp==='a') { o.x+=o.vx; o.y+=o.vy; o.rot+=o.rs; if(o.y>g.H+40){g.objs.splice(i,1);continue;} }
    if(o.tp==='x') { o.x+=o.vx; o.ph+=0.03; o.y+=Math.sin(o.ph)*1.5; if(o.x>g.W+40||o.x<-40){g.objs.splice(i,1);continue;} }
    if(o.tp==='b') { o.y+=o.vy; o.ph+=0.05; o.x+=Math.sin(o.ph)*0.8; if(o.y>g.H+40){g.objs.splice(i,1);continue;} }
    var d=Math.sqrt((o.x-r.x)*(o.x-r.x)+(o.y-r.y)*(o.y-r.y));
    if(d < o.r+r.w*0.4) {
      if(o.tp==='a' && g.inv<=0) { g.objs.splice(i,1); p2Hit(); }
      if(o.tp==='x') { g.objs.splice(i,1); g.progress=Math.max(0,g.progress-5); snd('no'); p2Msg(t('👽 Empurrão!','👽 ¡Empujón!'),1200); }
      if(o.tp==='b') {
        var et=o.et; g.objs.splice(i,1);
        if(!g.eq[et]) {
          g.eq[et]=true; snd('ok'); addXP(15); party();
          p2Msg(g.eqEmoji[et]+' '+g.eqName[L][et]+'!', 1500); p2Hud();
          if(g.eq[0]&&g.eq[1]&&g.eq[2]&&g.eq[3]) setTimeout(function(){ p2Msg(t('Tudo pronto pro Sol! ☀️','¡Todo listo para el Sol! ☀️'),2000); },1600);
        }
      }
    }
  }
  // Stars scroll
  for(var i=0;i<g.stars.length;i++) { g.stars[i].y+=g.stars[i].s; if(g.stars[i].y>g.H){g.stars[i].y=-5;g.stars[i].x=Math.random()*g.W;} }
  document.getElementById('p2bf').style.height=g.progress+'%';
}

function p2Drw() {
  var g=p2, c=g.ctx, W=g.W, H=g.H, pr=g.progress/100;
  // Background gradient Earth→Sun
  var gr=c.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'rgb('+Math.round(5+pr*200)+','+Math.round(8+pr*120)+','+Math.round(22-pr*22)+')');
  gr.addColorStop(1,'rgb('+Math.round(5+pr*60)+','+Math.round(8+pr*30)+','+Math.round(22+pr*10)+')');
  c.fillStyle=gr; c.fillRect(0,0,W,H);
  // Stars
  var sa=1-pr*0.7;
  for(var i=0;i<g.stars.length;i++){var s=g.stars[i]; c.fillStyle='rgba(255,255,255,'+(sa*0.8)+')'; c.beginPath(); c.arc(s.x,s.y,s.r,0,6.28); c.fill();}
  // Earth at start
  if(g.progress<20){
    c.globalAlpha=1-g.progress/20;
    c.fillStyle='#4a9eff'; c.beginPath(); c.arc(W/2,H+60+g.progress*2,100,0,6.28); c.fill();
    c.fillStyle='#3a8e3a'; c.beginPath(); c.arc(W/2-20,H+40+g.progress*2,30,0,6.28); c.fill();
    c.beginPath(); c.arc(W/2+30,H+60+g.progress*2,25,0,6.28); c.fill();
    c.globalAlpha=1;
  }
  // Sun at end
  if(g.progress>70){
    var sa2=(g.progress-70)/30, sy=-60+(1-sa2)*50;
    c.globalAlpha=sa2;
    var sg=c.createRadialGradient(W/2,sy,20,W/2,sy,150);
    sg.addColorStop(0,'rgba(255,217,61,0.8)'); sg.addColorStop(0.5,'rgba(255,138,92,0.3)'); sg.addColorStop(1,'rgba(255,90,58,0)');
    c.fillStyle=sg; c.fillRect(0,0,W,H*0.4);
    c.fillStyle='#ffd93d'; c.beginPath(); c.arc(W/2,sy,70,0,6.28); c.fill();
    c.globalAlpha=1;
  }
  // Objects
  for(var i=0;i<g.objs.length;i++){
    var o=g.objs[i];
    if(o.tp==='a'){
      c.save(); c.translate(o.x,o.y); c.rotate(o.rot);
      c.fillStyle='#8b7355'; c.beginPath(); c.arc(0,0,o.r,0,6.28); c.fill();
      c.fillStyle='#6b5335'; c.beginPath(); c.arc(-o.r*.3,-o.r*.2,o.r*.25,0,6.28); c.fill();
      c.beginPath(); c.arc(o.r*.2,o.r*.3,o.r*.18,0,6.28); c.fill();
      c.restore();
    }
    if(o.tp==='x'){
      c.fillStyle='#7ddf64'; c.beginPath(); c.arc(o.x,o.y,o.r,0,6.28); c.fill();
      c.fillStyle='#000';
      c.beginPath(); c.arc(o.x-5,o.y-3,3,0,6.28); c.fill();
      c.beginPath(); c.arc(o.x+5,o.y-3,3,0,6.28); c.fill();
      c.strokeStyle='#000'; c.lineWidth=1.5; c.beginPath(); c.arc(o.x,o.y+2,6,0,Math.PI); c.stroke();
      c.strokeStyle='#7ddf64'; c.lineWidth=2;
      c.beginPath(); c.moveTo(o.x-4,o.y-o.r); c.lineTo(o.x-8,o.y-o.r-10); c.stroke();
      c.beginPath(); c.moveTo(o.x+4,o.y-o.r); c.lineTo(o.x+8,o.y-o.r-10); c.stroke();
      c.fillStyle='#ffd93d';
      c.beginPath(); c.arc(o.x-8,o.y-o.r-10,3,0,6.28); c.fill();
      c.beginPath(); c.arc(o.x+8,o.y-o.r-10,3,0,6.28); c.fill();
    }
    if(o.tp==='b'){
      var bp=Date.now()*0.003+o.ph;
      c.strokeStyle='rgba(130,220,255,'+(0.5+Math.sin(bp)*0.3)+')'; c.lineWidth=2;
      c.beginPath(); c.arc(o.x,o.y,o.r,0,6.28); c.stroke();
      c.fillStyle='rgba(130,220,255,'+(0.3+Math.sin(bp)*0.15)+')'; c.fill();
      c.fillStyle='rgba(255,255,255,0.6)'; c.beginPath(); c.arc(o.x-o.r*.3,o.y-o.r*.3,o.r*.2,0,6.28); c.fill();
      c.font=(o.r*0.9)+'px serif'; c.textAlign='center'; c.textBaseline='middle';
      c.fillText(g.eqEmoji[o.et],o.x,o.y);
    }
  }
  // Rocket (based on Julia's drawing!)
  p2Rocket(c, g.rocket);
}

function p2Rocket(c, r) {
  var x=r.x, y=r.y, w=r.w, h=r.h, hw=w/2, hh=h/2;
  c.save(); c.translate(x,y); c.rotate(r.tilt*Math.PI/180);
  if(p2.inv>0 && Math.floor(p2.inv/4)%2===0) c.globalAlpha=0.4;
  // Flames (animated)
  var ft=Date.now()*0.01;
  for(var fi=0;fi<4;fi++){
    var fx=-hw*0.45+fi*hw*0.32;
    var fh=h*0.22+Math.sin(ft+fi*2.5)*h*0.08;
    c.fillStyle=fi%2===0?'#ff5e3a':'#ffd93d';
    c.beginPath(); c.moveTo(fx-w*0.06,hh); c.quadraticCurveTo(fx,hh+fh,fx+w*0.06,hh); c.fill();
  }
  // Body
  c.fillStyle='#e8e8f0'; c.strokeStyle='#555'; c.lineWidth=2;
  c.beginPath(); c.moveTo(-hw,-hh*0.3); c.lineTo(-hw,hh); c.lineTo(hw,hh); c.lineTo(hw,-hh*0.3); c.closePath(); c.fill(); c.stroke();
  // Nose cone (pointed like Julia drew)
  c.fillStyle='#d0d0dd';
  c.beginPath(); c.moveTo(0,-hh); c.lineTo(hw,-hh*0.3); c.lineTo(-hw,-hh*0.3); c.closePath(); c.fill(); c.stroke();
  // Left fin
  c.fillStyle='#ff5e3a';
  c.beginPath(); c.moveTo(-hw,hh*0.3); c.lineTo(-hw-w*0.3,hh+h*0.04); c.lineTo(-hw,hh); c.closePath(); c.fill(); c.stroke();
  // Right fin
  c.beginPath(); c.moveTo(hw,hh*0.3); c.lineTo(hw+w*0.3,hh+h*0.04); c.lineTo(hw,hh); c.closePath(); c.fill(); c.stroke();
  // Window 1 - Julia (top porthole)
  var wy1=-hh*0.05;
  c.fillStyle='#8fd4ff'; c.strokeStyle='#555'; c.lineWidth=2;
  c.beginPath(); c.arc(0,wy1,w*0.19,0,6.28); c.fill(); c.stroke();
  c.fillStyle='#f5d0b0'; c.beginPath(); c.arc(0,wy1,w*0.13,0,6.28); c.fill(); // face
  c.fillStyle='#1a1a2e'; c.beginPath(); c.arc(-w*0.04,wy1-w*0.02,1.5,0,6.28); c.fill();
  c.beginPath(); c.arc(w*0.04,wy1-w*0.02,1.5,0,6.28); c.fill();
  c.strokeStyle='#c48a5a'; c.lineWidth=1; c.beginPath(); c.arc(0,wy1+w*0.03,w*0.05,0,Math.PI); c.stroke();
  // Window 2 - Ninna (bottom porthole)
  var wy2=hh*0.38;
  c.fillStyle='#8fd4ff'; c.strokeStyle='#555'; c.lineWidth=2;
  c.beginPath(); c.arc(0,wy2,w*0.19,0,6.28); c.fill(); c.stroke();
  c.fillStyle='#f5d0b0'; c.beginPath(); c.arc(0,wy2,w*0.13,0,6.28); c.fill();
  c.fillStyle='#1a1a2e'; c.beginPath(); c.arc(-w*0.04,wy2-w*0.02,1.5,0,6.28); c.fill();
  c.beginPath(); c.arc(w*0.04,wy2-w*0.02,1.5,0,6.28); c.fill();
  c.strokeStyle='#c48a5a'; c.lineWidth=1; c.beginPath(); c.arc(0,wy2+w*0.03,w*0.05,0,Math.PI); c.stroke();
  c.restore();
}

function p2Hit() {
  p2.lives--; p2.inv=90; snd('no'); p2Hud();
  if(p2.lives<=0) p2Over();
  else p2Msg('💥 '+t('Ai!','¡Ay!')+' ❤️×'+p2.lives, 1500);
}

function p2Sun() {
  if(p2.eq[0]&&p2.eq[1]&&p2.eq[2]&&p2.eq[3]) p2Win();
  else {
    p2.lives--; p2Hud();
    if(p2.lives<=0){p2Over();return;}
    p2.progress=65; snd('no');
    var m=[]; for(var i=0;i<4;i++) if(!p2.eq[i]) m.push(p2.eqEmoji[i]);
    p2Msg('🔥 '+t('Falta: ','¡Falta: ')+m.join(' ')+'!', 2500);
  }
}

function p2Win() {
  p2.on=false; p2StopBGM(); snd('win'); addXP(50); party();
  document.getElementById('crew').classList.remove('on');
  var nm=P==='nina'?'Ninna':'Julia';
  document.getElementById('final').innerHTML=
    '<div class="f-big">🏆</div>'+
    '<div class="f-t">'+t('Missão Solar Completa!','¡Misión Solar Completa!')+'</div>'+
    '<div class="f-s">'+xp+' ⭐</div>'+
    '<div class="f-bx"><div class="f-bx-t">☀️ '+t('Chegou no Sol!','¡Llegaste al Sol!')+'</div><div class="f-bx-n">'+nm+' '+t('é astronauta de verdade!','¡es astronauta de verdad!')+'</div></div>'+
    '<div class="f-c">🧊🧑‍🚀🕶️🧴<br>'+t('Todos os equipamentos coletados!','¡Todos los equipos recolectados!')+'</div>'+
    '<div class="f-l">'+t('Fase criada pela Julia 💜','Fase creada por Julia 💜')+'</div>'+
    '<button class="f-btn" id="p2replay">'+t('🔄 Jogar de novo!','🔄 ¡Jugar de nuevo!')+'</button>'+
    '<button class="f-btn" style="background:rgba(255,255,255,.08);margin-top:8px" id="p2back">'+t('← Fases','← Fases')+'</button>';
  document.getElementById('p2replay').addEventListener('click',function(){startPhase2();});
  document.getElementById('p2back').addEventListener('click',function(){showPhases();});
  scr('final');
}

function p2Over() {
  p2.on=false; p2StopBGM(); snd('no');
  document.getElementById('crew').classList.remove('on');
  document.getElementById('final').innerHTML=
    '<div class="f-big">💫</div>'+
    '<div class="f-t">'+t('Fim da Missão!','¡Fin de la Misión!')+'</div>'+
    '<div class="f-s">'+t('Chegou a ','Llegaste al ')+Math.round(p2.progress)+'%!</div>'+
    '<div class="f-c">'+t('As estrelas chamam de novo!','¡Las estrellas llaman de nuevo!')+'</div>'+
    '<button class="f-btn" id="p2retry">'+t('🚀 Tentar de novo!','🚀 ¡Intentar de nuevo!')+'</button>'+
    '<button class="f-btn" style="background:rgba(255,255,255,.08);margin-top:8px" id="p2back2">'+t('← Fases','← Fases')+'</button>';
  document.getElementById('p2retry').addEventListener('click',function(){startPhase2();});
  document.getElementById('p2back2').addEventListener('click',function(){showPhases();});
  scr('final');
}

function p2Hud() {
  var h=''; for(var i=0;i<3;i++) h+=(i<p2.lives?'❤️':'🖤');
  document.getElementById('p2lives').textContent=h;
  var e=''; for(var i=0;i<4;i++) e+='<div class="p2-eq'+(p2.eq[i]?' got':'')+'">'+p2.eqEmoji[i]+'</div>';
  document.getElementById('p2equip').innerHTML=e;
}

function p2Msg(text,dur) {
  var el=document.getElementById('p2msg'); el.textContent=text; el.classList.add('show');
  clearTimeout(p2.msgT); p2.msgT=setTimeout(function(){el.classList.remove('show');},dur);
}

// Phase 2 touch/mouse/keyboard controls
document.addEventListener('touchmove',function(e){if(p2.on)p2.rocket.tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchstart',function(e){if(p2.on)p2.rocket.tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('mousemove',function(e){if(p2.on)p2.rocket.tx=e.clientX;});
document.addEventListener('keydown',function(e){
  if(!p2.on)return;
  if(e.key==='ArrowLeft') p2.rocket.tx=p2.rocket.x-50;
  if(e.key==='ArrowRight') p2.rocket.tx=p2.rocket.x+50;
});

// ============== PHASE 2 EPIC BGM ==============
function p2BGM() {
  if(!AC||p2.bgmOn)return;
  p2.bgmOn=true;
  if(AC.state==='suspended') AC.resume();
  if(bgGain) bgGain.gain.value=0; // silence Phase 1 BGM
  var bpm=140, ms=60000/bpm, ni=0;
  var mel=[294,349,440,392,349,294,262,294,349,392,440,523,494,440,392,349];
  var bas=[147,147,175,175,196,196,131,131,147,147,175,175,196,196,131,131];
  p2.bgmInt=setInterval(function(){
    if(muted||!AC||!p2.on)return;
    try{
      var now=AC.currentTime, n=ni%mel.length;
      // Melody
      var o=AC.createOscillator(),g=AC.createGain(),f=AC.createBiquadFilter();
      f.type='lowpass';f.frequency.value=1200; o.connect(f);f.connect(g);g.connect(AC.destination);
      o.type='square'; o.frequency.value=mel[n];
      g.gain.setValueAtTime(0.055,now); g.gain.exponentialRampToValueAtTime(0.001,now+ms/1000*0.9);
      o.start(now);o.stop(now+ms/1000);
      // Harmony
      var h=AC.createOscillator(),hg=AC.createGain();
      h.connect(hg);hg.connect(AC.destination);
      h.type='triangle'; h.frequency.value=mel[n]*1.5;
      hg.gain.setValueAtTime(0.02,now); hg.gain.exponentialRampToValueAtTime(0.001,now+ms/1000*0.6);
      h.start(now);h.stop(now+ms/1000);
      // Bass
      var b=AC.createOscillator(),bg2=AC.createGain(),bf=AC.createBiquadFilter();
      bf.type='lowpass';bf.frequency.value=400; b.connect(bf);bf.connect(bg2);bg2.connect(AC.destination);
      b.type='sawtooth'; b.frequency.value=bas[n];
      bg2.gain.setValueAtTime(0.04,now); bg2.gain.exponentialRampToValueAtTime(0.001,now+ms/1000*0.8);
      b.start(now);b.stop(now+ms/1000);
      // Kick on every 4
      if(n%4===0){
        var k=AC.createOscillator(),kg=AC.createGain();
        k.connect(kg);kg.connect(AC.destination);
        k.frequency.setValueAtTime(150,now);k.frequency.exponentialRampToValueAtTime(30,now+0.1);
        kg.gain.setValueAtTime(0.07,now);kg.gain.exponentialRampToValueAtTime(0.001,now+0.15);
        k.start(now);k.stop(now+0.2);
      }
      // Hi-hat on even beats
      if(n%2===0){
        var hh2=AC.createOscillator(),hhg=AC.createGain(),hhf=AC.createBiquadFilter();
        hhf.type='highpass';hhf.frequency.value=8000;
        hh2.connect(hhf);hhf.connect(hhg);hhg.connect(AC.destination);
        hh2.type='sawtooth';hh2.frequency.value=6000+Math.random()*2000;
        hhg.gain.setValueAtTime(0.012,now);hhg.gain.exponentialRampToValueAtTime(0.001,now+0.04);
        hh2.start(now);hh2.stop(now+0.06);
      }
      ni++;
    }catch(e){}
  }, ms);
}

function p2StopBGM() {
  p2.bgmOn=false;
  if(p2.bgmInt){clearInterval(p2.bgmInt);p2.bgmInt=null;}
  if(bgGain) bgGain.gain.value=muted?0:0.055;
}
